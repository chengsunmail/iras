@@H1@@第 13 章 财务评价

@@H2@@13.1 财务评价依据

本项目财务评价依据《建设项目经济评价方法与参数(第三版)》(国家发展改革委、住房和城乡建设部, 2006)、《政府投资项目可行性研究报告编制深度规定》(住建部, 2017 年发改投资规〔2017〕1638 号)以及现行国家相关财税政策, 对项目进行财务可行性评价。

财务评价采用现金流量分析法, 计算项目全投资和自有资金两个层次的财务指标, 包括内部收益率(IRR)、净现值(NPV)、投资回收期、盈亏平衡点等关键指标, 并对主要不确定性因素进行敏感性分析。

产品销售单价|{{ finance.params.price }} 元/kg
设计年产量|{{ farm.yieldTons }} 吨/年
投产爬坡|第 1 年 {{ (finance.params.ramp1*100)|round(0) }}%, 第 2 年 {{ (finance.params.ramp2*100)|round(0) }}%, 第 3 年起 {{ (finance.params.ramp3*100)|round(0) }}% 满产
自有资金比例|{{ (finance.params.ownPct*100)|round(0) }}%
银行贷款利率|{{ (finance.params.loanRate*100)|round(1) }}% 年(还款期 {{ finance.params.loanYears }} 年)
基准折现率|{{ (finance.params.discount*100)|round(1) }}%
所得税率|{{ (finance.params.taxRate*100)|round(0) }}%
@@END_TABLE@@

@@H2@@13.3 销售收入和销售税金估算

项目按设计产能 {{ farm.yieldTons }} 吨/年, 单价 {{ finance.params.price }} 元/kg, 满产年销售收入约 {{ (farm.yieldTons * 1000 * finance.params.price / 10000)|round(0) }} 万元。各年销售收入按达产率逐年增长, 详见下表:

@@TABLE@@

{% endif %}

{% else %}

@@H3@@13.6.2 自有资金现金流量

{% elif finance.indicators.bepPct < 75 %}

{% elif finance.indicators.bepPct < 90 %}

<script type="text/njk-template" id="tpl-ch02">@@H1@@第 2 章 项目背景与建设必要性

@@H2@@2.1 行业发展现状

{% if farm.species == "salmon" %}
@@P@@大西洋三文鱼(Salmo salar)是全球高端水产消费品的代表, 国际养殖产量约 280 万吨/年, 其中挪威约占 50%, 苏格兰、智利、加拿大、法罗群岛是主要传统产区。受海上网箱养殖空间饱和、海水温度上升、海虱寄生等问题影响, 国际三文鱼产业在 2015 年后转向<strong>陆基循环水养殖(Land-based RAS)</strong>方向。

@@P@@典型国际项目: 美国 Atlantic Sapphire 在迈阿密的 Bluehouse 工厂(规划年产 10 万吨)、丹麦 Salmon Evolution、波兰 Ocean Fish Farms 等均是 RAS 三文鱼大型工业化项目代表。挪威本土 AKVA Group、Billund Aquaculture 等是 RAS 工程总包商。

@@P@@中国是世界最大的三文鱼消费国之一, 但本土产量微薄(主要依赖进口)。近年来青岛、烟台、湛江等沿海地区已有 RAS 三文鱼试点项目落地, 国内市场对本土养殖的高品质三文鱼需求强烈, 价格稳定在 60-90 元/kg。

{% elif farm.species == "turbot" %}
@@P@@大菱鲆(Scophthalmus maximus, 多宝鱼)是我国 1992 年从英国引进的高端海水鱼品种, 经过 30 多年发展, 已成为山东、辽宁、河北等北方海域的支柱海水养殖品种, 全国年产量约 5-6 万吨。

@@P@@传统流水式养殖能耗高(地下水恒温泵抽)、水质波动大、用水量大。2010 年后, 山东莱州东方海洋、烟台中集来福士等企业开始向<strong>循环水养殖</strong>转型, 实现节水、节地、稳产。国家海水鱼产业技术体系连续多年开展循环水养殖技术研究和成本调查, 工业实测密度可达 50-70 kg/m³(底面积), 综合成本约 46-50 元/kg。

@@P@@国内大菱鲆市场需求稳定, 价格 60-90 元/kg, 出口日韩市场需求持续增长。

{% elif farm.species == "grouper" %}
@@P@@石斑鱼是我国华南地区高端海水养殖品种, 主要品种有珍珠龙趸、龙胆石斑、东星斑等, 海南、广东、福建是主产区, 全国年产量约 15-20 万吨。

@@P@@传统网箱养殖受台风、海水污染、病害等影响, 损失率高。RAS 工厂化养殖能精确控制水温、盐度、溶氧, 显著降低损失率, 提高商品质量。海南、广东已有多个 RAS 石斑鱼项目投产, 综合成本可控制在 60-100 元/kg, 售价 100-200 元/kg, 利润空间较大。

{% elif farm.species == "perch" %}
@@P@@加州鲈(Micropterus salmoides)是我国近年快速发展的淡水肉食性鱼品种, 广东、湖北、江苏、浙江是主产区, 全国年产量约 70 万吨, 已成为继四大家鱼之后的国内淡水鱼第五大品种。

@@P@@池塘养殖密度受限于水质和疾病, 目前广东中山、佛山等地企业已开始尝试<strong>设施化/工厂化</strong>加州鲈养殖, RAS 是重要方向之一。市场售价稳定在 30-50 元/kg, 工厂化养殖综合成本约 25-35 元/kg, 有一定利润空间。

{% elif farm.species == "mandarin" %}
@@P@@鳜鱼(Siniperca chuatsi, 桂花鱼)是我国传统名贵淡水鱼, 售价高(80-150 元/kg), 主要市场在华南、华东高端消费。传统养殖依赖活饵投喂, 限制了产业规模化。

@@P@@近年来鳜鱼配合饲料技术取得突破, 配合循环水养殖工艺, 鳜鱼工厂化养殖成为高端淡水鱼产业的代表方向。广东、福建、湖北已有多个 RAS 鳜鱼项目落地。

{% elif farm.species == "tilapia" %}
@@P@@罗非鱼是世界第二大养殖鱼品种, 全球年产量约 600 万吨, 我国年产量约 170 万吨, 主要出口欧美东南亚, 国内消费稳定。罗非鱼养殖以广东、海南、广西等南方省份为主。

@@P@@罗非鱼传统池塘养殖成本极低(20-25 元/kg), 但 RAS 养殖在节水、节地、防病、出口品控等场景下仍有独特优势。

{% elif farm.species == "eel" %}
@@P@@鳗鲡(日本鳗或欧洲鳗)是高经济价值的洄游鱼类, 苗种依赖野外捕获, 受国际公约限制日益严格。我国福建、广东是主要养殖产区, 主要出口日本市场。

@@P@@RAS 工厂化养殖能精确控制水温(26-28°C)、水质和粉料投喂, 是鳗鲡集约化养殖的成熟工艺, 综合成本约 60-100 元/kg, 售价稳定在 100-200 元/kg。

{% elif farm.species == "shrimp" %}
@@P@@南美白对虾(Litopenaeus vannamei)是我国第一大养殖虾品种, 全国年产量约 200 万吨, 沿海各省均有大规模养殖。

@@P@@近年来"白便病"、"早死病"等病害问题严重, 传统土塘养殖损失率高。RAS 清水养殖(区别于 Biofloc 浊水养殖)通过封闭防病、精确控温、稳定水质, 成为高品质对虾养殖的发展方向之一。

{% else %}
@@P@@{{ farm.speciesName }}是我国重要水产养殖品种, 在传统养殖模式存在水资源消耗大、病害风险高、产品品质不稳定等问题的背景下, 循环水养殖(RAS)作为现代渔业代表性技术正在快速发展。
{% endif %}

@@H2@@2.3 项目建设必要性

本项目建设必要性体现在以下几个方面:

@@H3@@2.3.1 满足国内市场对高品质 {{ farm.speciesName }} 的强劲需求

{% if farm.species == "salmon" %}
@@P@@中国是世界最大的三文鱼消费国之一, 年消费量超过 30 万吨, 但本土产量不足 1 万吨, 95% 以上依赖进口(主要来自挪威、智利、法罗群岛)。受国际供应链波动、汇率波动、国际海运成本等因素影响, 进口价格不稳定, 严重依赖进口的格局对国内产业链和消费者权益保障不利。

@@P@@本项目年产 1000 吨陆基 RAS 三文鱼, 是国内三文鱼自主供应能力的重要补充, 有助于减少进口依赖、稳定国内市场价格、保障食品供应安全。

{% elif farm.species == "turbot" %}
@@P@@大菱鲆是国内中高端海水鱼消费的重要品种, 市场需求稳定增长。本项目采用 RAS 工艺, 突破了传统大菱鲆养殖对北方地下水恒温泵抽的依赖, 实现高密度、节水、稳产, 为产业升级提供示范。

@@H3@@2.3.2 推动水产养殖业转型升级

@@P@@RAS 工厂化养殖是世界水产养殖技术发展的重要方向, 代表了"节水、节地、节能、可控、生态"的现代渔业理念。本项目采用国际先进的 RAS 工艺, 配置 {{ farm.totalSubSystems }} 套独立模块和 N+1 备用设备, 是地区水产养殖业从传统粗放型向集约化、设施化、生态化转型升级的代表性项目。

@@P@@本项目水循环利用率达 85-95%, 每生产 1 公斤鱼仅需 0.5-1 m³ 新水, 仅为传统流水养殖的 5-10%。废水集中处理后达标排放, 几乎无面源污染。{% if farm.totalSystemVolume > 0 %}本项目系统总水体 {{ farm.totalSystemVolume|round(0) }} m³, 按日换水率 5-10% 计算, 日补水量约 {{ (farm.totalSystemVolume * 0.075)|round(0) }} m³, 年补水量约 {{ (farm.totalSystemVolume * 0.075 * 365 / 10000)|round(1) }} 万 m³, 远低于同等产能的传统养殖。{% endif %}

<script type="text/njk-template" id="tpl-ch03">@@H1@@第 3 章 市场分析与建设规模

{% elif farm.species == "grouper" %}
@@P@@<strong>国内市场</strong>: 我国石斑鱼年产量约 15-20 万吨, 主要市场在华南、华东高端餐饮和活鲜配送, 售价 80-200 元/kg(根据品种不同差异较大)。出口香港、东南亚市场需求稳定。

<script type="text/njk-template" id="tpl-ch05">@@H1@@第 5 章 工艺技术方案

@@H2@@5.1 工艺路线选择

{% if farm.species == "salmon" %}
@@P@@大西洋三文鱼是冷水洄游鱼类, 养殖水温要求严格控制在 12-15°C 之间。我国年均气温普遍高于此温度区间, 沿海地区夏季水温更高达 25-30°C, 不能直接进行三文鱼养殖。采用循环水养殖系统(RAS)精确控温是三文鱼陆基工厂化养殖的<strong>唯一可行工艺</strong>。
@@P@@RAS 系统通过物理过滤、生物过滤、消毒、增氧、脱气、温控等一体化处理, 实现 85-95% 的水循环利用, 在闭环条件下创造稳定可控的养殖环境。本项目参考挪威 Atlantic Sapphire(迈阿密 RAS 三文鱼厂, 设计年产 10 万吨)、苏格兰 Loch Duart 等国际成熟案例的工艺思路。
{% elif farm.species == "turbot" %}
@@P@@大菱鲆(Scophthalmus maximus)为冷温性底栖海水鱼, 养殖水温 14-18°C, 盐度 25-32‰, 对水质透明度和溶氧要求高。我国山东、辽宁等北方海域冬季水温过低, 夏季又过高, 传统流水式养殖能耗大、水质波动大。RAS 工艺通过精确温控和水质净化, 显著提高大菱鲆的生长速度和成活率, 工业实测密度可达 50-70 kg/m³(底面积), 是目前国内大菱鲆工厂化养殖的主流工艺。
{% elif farm.species == "grouper" %}
@@P@@石斑鱼是我国华南地区重要海水养殖品种, 适养水温 24-30°C, 对水质和溶氧要求高, 尤其稚鱼期对环境波动敏感。本项目采用 RAS 工艺, 通过精确控温、稳定水质和封闭防病, 解决传统网箱/池塘养殖中水温波动大、病害易发、苗种成活率低等核心问题。
{% elif farm.species == "perch" %}
@@P@@加州鲈是淡水肉食性鱼, 适养水温 22-28°C, 对水质要求较高。RAS 工艺相比池塘养殖具有节水节地、病害可控、产品稳定等优势, 是华南地区加州鲈"陆基工厂化"养殖的主流方向。
{% elif farm.species == "mandarin" %}
@@P@@鳜鱼是淡水珍贵肉食性鱼类, 售价高、市场稳定。其养殖适温 22-28°C, 对水质和饵料要求严格(传统活饵投喂)。RAS 工艺配合配合饲料技术, 能实现鳜鱼的工厂化稳产, 是高端淡水鱼养殖的代表方向。
{% elif farm.species == "tilapia" %}
@@P@@罗非鱼适应性强, 耐受温度 25-32°C, 是世界第二大养殖鱼类。本项目采用 RAS 主要为节水节地、控制疾病传播, 并实现一年多茬养殖。
{% elif farm.species == "eel" %}
@@P@@鳗鲡(日本鳗或欧洲鳗)是高经济价值的洄游鱼类, 苗种依赖野外捕获, 养殖周期长(2-3 年)。RAS 工艺能精确控制水温(养殖温度 26-28°C)、水质和粉料投喂, 是鳗鲡集约化养殖的成熟工艺, 日本和我国福建已有大量工业化案例。
{% elif farm.species == "shrimp" %}
@@P@@南美白对虾耐高温(28-32°C), 能耐受较低盐度(5-35‰), 是世界最重要的养殖对虾品种。本项目采用清水 RAS 工艺(区别于 Biofloc 浊水养殖), 配合高密度养殖, 实现节水节地、防病和稳产。
{% else %}
@@P@@本项目采用循环水养殖工艺(RAS), 通过物理过滤、生物过滤、消毒、增氧、脱气一体化处理, 实现高密度、节水节地、可控环境的工厂化养殖。
{% endif %}

@@P@@RAS 工艺的关键优势:
@@LIST@@
- <strong>节水</strong>: 水循环利用率 85-95%, 每公斤鱼肉用水 0.5-1 m³, 仅为传统流水养殖的 5-10%
- <strong>节地</strong>: 高密度养殖(30-100 kg/m³), 单位产能占地仅为传统土塘的 1/10-1/50
- <strong>可控</strong>: 温度、溶氧、pH、TAN 全程精确控制, 不受季节和天气影响, 全年生产
- <strong>环保</strong>: 废水集中处理, 固体废物可作有机肥, 几乎零外排, 无面源污染
- <strong>生物安全</strong>: 封闭系统隔绝外部病原, 减少药物使用, 食品安全有保障
- <strong>选址灵活</strong>: 不依赖天然水源, 可建在城市近郊、内陆、沙漠等非传统养殖地区
@@END_LIST@@

@@H2@@5.2 工艺流程

@@P@@<strong>鱼池 → 转鼓微滤机 → 蛋白分离器(旁路) → 生物滤池 → UV 消毒 → CO₂ 脱气塔 → 增氧 → 鱼池</strong>

@@P@@同时配置 3 条旁路支路:

- <strong>蛋白分离支路</strong>: 分流约 {{ workflow.skimmer.flowPct|round(0) if workflow.skimmer.enabled else 0 }}% 循环流量, 去除 DOM(溶解有机物)和细颗粒 TSS{% if workflow.skimmer.enabled and workflow.skimmer.mode == 'ozone' %}, 配臭氧增强{% endif %}

- <strong>AOP 高级氧化支路</strong>: {% if workflow.aop.enabled %}分流约 {{ workflow.aop.flowPct|round(0) }}% 流量, 用臭氧+UV 协同氧化去除 Geosmin/2-MIB(土腥味物质)和深度 DOM{% else %}本项目暂不设 AOP 支路{% endif %}
@@END_LIST@@

@@H3@@8.2.2 节水措施

@@LIST@@
- <strong>循环水利用率 85-95%</strong>: 系统设计的天然节水属性, 95% 水循环重复使用
- <strong>板换补水预热</strong>: 进水通过板式换热器与排水换热, 减少新水加热能耗(同时也是节水措施)
- <strong>分级使用</strong>: 系统排水(经污泥沉淀后上清液)可视情况用于车间地面冲洗, 实现"清污分流, 重复利用"
- <strong>雨水收集</strong>: 屋面雨水可用于车间地面冲洗、设备外洗, 减少自来水消耗
- <strong>污水深度处理</strong>: 排放水经污水处理后可考虑用于绿化, 实现近零排放
@@END_LIST@@

@@H2@@8.3 节能节水效益

@@P@@相比同等产能的传统流水式养殖:

@@TABLE@@
对比项|传统流水式|RAS(本项目)|节约比例
单位用水量(m³/kg)|5-20|约 {{ (farm.dischargeM3Y / (farm.yieldTons * 1000))|round(2) }}|约 90%
单位电耗(kWh/kg)|0.5-2|约 {{ ((opex.totalExclDep * 0.20) / 0.7 / (farm.yieldTons * 1000))|round(2) }}|相对增加 (RAS 高电耗)
单位占地(m²/吨)|500-2000|约 50-100|约 90-95%
@@END_TABLE@@

@@P@@注: RAS 单位电耗高于传统流水, 但单位用水和占地的节约显著, 综合"水-能-地"三资源的节约价值, RAS 是更可持续的养殖模式。
</script>
<script type="text/njk-template" id="tpl-ch09">@@H1@@第 9 章 环境影响评价

@@P@@<strong>说明</strong>: 本章为可研报告中的环境影响初步分析, 不能替代正式的环境影响评价(环评)。建议项目立项后委托具有相应资质的环评机构开展专项环境影响评价, 出具独立的环评报告。

@@H2@@9.1 项目所在地环境现状

@@P@@(本节关于项目所在地环境质量现状, 包括大气、水体、土壤、声环境、生态等内容, 由业主或编制单位根据当地环评数据补充。)

@@H2@@9.2 主要污染源识别

本项目主要污染源识别如下:

@@H3@@9.2.1 废水

@@TABLE@@
废水类型|来源|主要污染物|日产生量
系统排水(换水溢流)|穿越系统边界的换水/溢流|TAN, NO₃, TSS|约 {{ farm.dischargeM3D|round(0) }} m³/d (溶解态: TAN {{ farm.dischargeTAN_mg_L|round(2) }} mg/L · NO₃-N {{ farm.dischargeNO3_mg_L|round(1) }} mg/L; 固相 TSS 由 RDF + 蛋分捕获后进污泥处理, 不直接排入水相)
{% if workflow.denitri.enabled %}反硝化排泥|反硝化反应器|生物污泥|约 0.1-0.3 m³/d
{% endif %}车间冲洗|地面、设备外洗|低浓度 TSS|约 5-10 m³/d
@@END_TABLE@@

@@H3@@9.2.2 固废

@@LIST@@
- 残饵粪便(过滤后浓缩液):每天约 {{ (farm.totalFeedDaily * 0.30)|round(0) }} kg(估算, 按饲料 30% 转化为固废, 含水率高)
- 死鱼:正常运营死亡率 1-3%, 按 1% 估算约 {{ (farm.yieldTons * 0.01 * 1000 / 365)|round(1) }} kg/d
- 用药包装、办公生活垃圾:小量
@@END_LIST@@

@@H3@@9.2.3 废气

@@LIST@@
- CO₂ 脱气塔尾气: 主要为 CO₂、水汽, 浓度低, 直接排放
- BF 风机尾气: 含少量氨气, 经车间通风稀释
- 臭氧设备尾气{% if workflow.skimmer.mode == "ozone" or workflow.aop.enabled %}: 残余臭氧需破坏(臭氧破坏器), 排放浓度 < 0.1 mg/m³{% endif %}
@@END_LIST@@

@@H3@@9.2.4 噪声

@@LIST@@
- 主循环泵房:约 80-85 dB(A)
- 风机房:约 80-90 dB(A)
- 制氧机/液氧汽化器:约 70-80 dB(A)
@@END_LIST@@

@@H2@@9.3 主要污染物排放标准

本项目排放遵循以下标准:

@@TABLE@@
污染物类别|执行标准|主要指标限值
水产养殖排水|GB 18596-2001 《海水养殖水排放要求》或地方标准|TSS ≤ 10 mg/L, COD ≤ 30 mg/L, NH₃-N ≤ 4 mg/L
工业固废|GB 18599-2020 《一般工业固体废物贮存和填埋污染控制标准》|—
噪声|GB 12348-2008 《工业企业厂界环境噪声排放标准》|2 类区昼间 60 dB(A), 夜间 50 dB(A)
@@END_TABLE@@

@@H2@@9.4 环境保护措施

@@H3@@9.4.1 废水处理

@@LIST@@
- <strong>污水处理设施</strong>: 设置废水沉淀池 + 过滤 + 生物处理(MBR 或 SBR), 出水达 GB 18596-2001 排放标准
- <strong>废水重复利用</strong>: 处理后达标的水可用于车间冲洗、绿化, 减少外排
- <strong>污水雨水分流</strong>: 雨污分流, 雨水可直接排放, 污水经处理后再排
- <strong>排放监测</strong>: 安装水质在线监测仪, 在线监测 COD、氨氮、TSS、流量
@@END_LIST@@

@@H3@@9.4.2 固废处理

@@LIST@@
- <strong>残饵粪便资源化</strong>: 浓缩后委外作有机肥原料, 实现资源化利用
- <strong>死鱼无害化</strong>: 设置死鱼处理设施(深埋、焚烧或委外处理), 防止疾病传播
- <strong>污泥脱水</strong>: 反硝化排泥经脱水后委外处理
- <strong>办公生活垃圾</strong>: 分类收集, 委托环卫部门清运
@@END_LIST@@

@@H3@@9.4.3 噪声控制

@@LIST@@
- 泵房和风机房采用隔音墙、消音器, 厂界噪声控制在标准范围内
- 设备底座加装减振垫, 降低固体传声
- 噪声大的设备布置在车间内部, 避免靠近厂界
@@END_LIST@@

@@H3@@9.4.4 大气控制

@@LIST@@
- 臭氧设备配臭氧破坏器, 排放浓度 < 0.1 mg/m³
- BF 风机尾气经车间通风稀释, 不会造成厂区氨气浓度超标
- 应急发电机配尾气净化装置(如使用)
@@END_LIST@@

@@H2@@9.5 环境影响初步分析

@@P@@基于上述污染源识别和环保措施, 本项目对环境的总体影响:

@@LIST@@
- <strong>水环境</strong>: 排放水量小, 经处理后达标排放, 对受纳水体影响微小
- <strong>大气环境</strong>: 主要排放为低浓度 CO₂ 和水汽, 无 SO₂、NOₓ 等空气污染物排放
- <strong>声环境</strong>: 经噪声控制措施后, 厂界噪声达标
- <strong>生态环境</strong>: 项目封闭运行, 不直接接触自然水体生态系统; 节水节地, 对周边生态系统影响小
- <strong>固废</strong>: 通过资源化和无害化处理, 不会造成二次污染
@@END_LIST@@

{% if farm.yieldTons > 2000 %}
@@P@@<strong>注意</strong>: 本项目规模较大(年产 {{ farm.yieldTons }} 吨, 总投资 {{ capex.totalInvestment|wan }} 万元), 可能需要编制完整的环境影响评价报告书(而非环境影响报告表)。请业主与当地环保主管部门确认。
{% else %}
@@P@@<strong>初步结论</strong>: 本项目规模适中, 通过完善的环保设施和管理, 环境影响可控。建议下一步委托有资质机构开展正式环评, 出具环评报告或环评登记表。
{% endif %}

<script type="text/njk-template" id="tpl-ch10">@@H1@@第 10 章 劳动安全卫生与消防

@@H2@@10.1 危险源识别

本项目主要危险源识别如下:

@@H3@@10.1.1 化学品危险

@@TABLE@@
化学品|危险性|存储方式|应急措施
液氧|强氧化剂, 助燃, 低温|3 t 立式真空保温储罐, 室外通风|防火、防油、防有机物接触
{% if workflow.skimmer.mode == "ozone" or workflow.aop.enabled %}臭氧|强氧化剂, 有毒(8 ppm 致命)|现场制氧, 不储存; 配臭氧检测仪 + 破坏器|泄漏时撤离 + 通风
{% endif %}{% if workflow.denitri.enabled %}甲醇|易燃, 有毒|防爆桶装, 通风库房|防火、防泄漏、防误饮
{% endif %}NaHCO₃|腐蚀性中等(粉尘吸入有刺激)|干燥库房|戴口罩、护目镜
有机酸 / 消毒剂|腐蚀性, 部分有毒|防腐蚀库房|戴防护手套
@@END_TABLE@@

@@H3@@10.1.2 电气危险

@@LIST@@
- 高压配电: 10 kV 进线 + 变压器, 电气作业须持证
- 水泵风机: 接地保护、漏电保护
- 潮湿环境: 养殖车间湿度大, 电气设备 IP 等级 ≥ IP54
- 应急照明: 应急通道、配电房、控制室设应急照明
@@END_LIST@@

@@H3@@10.1.3 设备机械危险

@@LIST@@
- 转鼓微滤机: 转动部件, 防夹手
- 鱼池: 高水位, 防溺水, 设防护栏
- 水泵风机: 高速转动, 防卷入
- 维修区域: 设安全标识、护栏、警示灯
@@END_LIST@@

@@H3@@10.1.4 生物危险

@@LIST@@
- 鱼类病原: 进出消毒, 防交叉污染
- 死鱼处理: 戴手套, 防止刺伤
- 操作人员: 持健康证, 定期体检, 防疾病传播
@@END_LIST@@

@@H2@@10.2 劳动安全措施

@@H3@@10.2.1 安全管理体系

@@LIST@@
- 设立安全生产委员会, 总经理任主任
- 配专职安全员(规模 > 100 人则专职 1 人, < 100 人可兼职)
- 制订《安全生产责任制》《作业安全 SOP》《应急预案》
- 班前安全教育、月度安全会议、季度应急演练
- 持证上岗: 电工、压力容器(液氧)、特种作业人员持证
@@END_LIST@@

@@H3@@10.2.2 个人防护

@@LIST@@
- 工作服 + 防滑工作鞋(全员)
- 安全帽(进入机房、维修区)
- 护目镜 + 防腐蚀手套(化学品操作)
- 防尘口罩(粉尘作业)
- 救生衣 + 安全带(高位作业)
@@END_LIST@@

@@H3@@10.2.3 安全设施

@@LIST@@
- 警示标识、安全标语全覆盖
- 紧急停机按钮(主要设备旁)
- 紧急洗眼器、淋浴器(化学品操作区)
- 救生圈、防护栏(鱼池周边)
- 安全通道、紧急疏散标识
@@END_LIST@@

@@H2@@10.3 卫生措施

@@H3@@10.3.1 工作环境卫生

@@LIST@@
- 车间通风换气 6-10 次/h, 控制氨气 < 5 ppm
- 噪声控制: 操作区 < 85 dB(A), 办公区 < 60 dB(A)
- 照明: 操作区 ≥ 200 lux, 办公区 ≥ 300 lux, 化验区 ≥ 500 lux
- 温湿度: 办公区 18-26°C/40-70%RH, 化验区 22°C/50%RH
@@END_LIST@@

@@H3@@10.3.2 食品安全卫生

@@LIST@@
- 操作人员持健康证, 每年体检, 患传染病者不得上岗
- 操作前消毒洗手, 进入车间换工作服 + 消毒鞋
- 设置消毒池(进出车间)
- 防虫鼠害: 出入口设防虫帘、防鼠板
- 化验室: GMP 标准, 取样、分析全程记录
@@END_LIST@@

@@H3@@10.3.3 员工生活卫生

@@LIST@@
- 食堂: 满足《食品安全法》要求, 食材采购索证、留样
- 宿舍: 通风、采光、热水、洗浴等基本设施
- 医务室: 配急救药品、AED 体外除颤仪
- 健康档案: 每位员工建立健康档案
@@END_LIST@@

@@H2@@10.4 消防设计

@@H3@@10.4.1 消防设计依据

@@LIST@@
- 《建筑设计防火规范》(GB 50016-2014, 2018 年版)
- 《建筑灭火器配置设计规范》(GB 50140-2005)
- 《自动喷水灭火系统设计规范》(GB 50084-2017)
- 《火灾自动报警系统设计规范》(GB 50116-2013)
- 当地消防主管部门具体要求
@@END_LIST@@

@@H3@@10.4.2 火灾危险性分类

@@TABLE@@
建筑物|火灾危险性|耐火等级
养殖主车间|戊类|二级
水处理机房|戊类|二级
液氧站|甲类(强氧化剂)|二级
柴油发电机房|丁类|二级
办公楼|民用|二级
仓库(化学品)|丙类|二级
@@END_TABLE@@

@@H3@@10.4.3 消防设施

@@LIST@@
- <strong>消防水源</strong>: 室外消防栓 + 自建消防水池(储水量符合 GB 50016 要求)
- <strong>室内消火栓</strong>: 主要建筑物按规范设置
- <strong>自动喷水灭火</strong>: 配电房、化验室、办公楼设置
- <strong>气体灭火</strong>: 配电房、PLC 室设置七氟丙烷或 IG541 气体灭火系统
- <strong>灭火器</strong>: 各场所按规范配置(干粉、CO₂、ABC 类等)
- <strong>火灾报警</strong>: 全厂火灾自动报警系统(感烟、感温、手报)
- <strong>应急照明 + 疏散标识</strong>: 主要通道、安全出口
@@END_LIST@@

@@H3@@10.4.4 液氧站消防特殊要求

@@LIST@@
- 液氧储罐周围 5 m 内不得有可燃物、油脂、有机物
- 设独立防火堤, 隔离非氧气区
- 配警示标识"严禁烟火"、"防油防有机物"
- 操作平台、阀门防腐防油处理
- 储罐设安全阀、压力表、温度计、爆破片
- 雷电保护: 储罐接地、避雷针保护
@@END_LIST@@

@@H2@@10.5 应急预案

@@H3@@10.5.1 应急组织机构

@@LIST@@
- 设应急指挥小组: 总经理任组长, 各部门负责人为成员
- 应急救援队伍: 包括灭火队、抢险队、医疗队、警戒队
- 24×7 值班制度: 安全员、技术员轮流值班
@@END_LIST@@

@@H3@@10.5.2 主要应急预案

@@TABLE@@
事故类型|主要应急措施
火灾|疏散人员 → 报警(119)→ 启动消防设施 → 切断电源/气源 → 灭火
液氧泄漏|停止作业 → 疏散人员 → 通风 → 关闭阀门 → 报警(若大量泄漏)
{% if workflow.skimmer.mode == "ozone" or workflow.aop.enabled %}臭氧泄漏|戴防毒面具 → 疏散 → 通风 → 关闭臭氧设备 → 启用臭氧破坏器
{% endif %}停电|启动柴油发电机 → 检查关键设备运行 → 联系供电公司
设备故障(主泵/风机)|切换备用机 → 维修 → 报警(若涉及生物安全)
水质失控(DO 暴跌, TAN 暴涨)|加大液氧供给/换水 → 报警 → 排查原因
火灾事故|按消防应急预案处置
人员伤害|急救 → 送医 → 上报
@@END_TABLE@@

@@H3@@10.5.3 演练与培训

@@LIST@@
- 全员安全培训: 每年 ≥ 24 小时(含新员工 ≥ 72 小时)
- 应急演练: 每季度 ≥ 1 次, 包括火灾、液氧泄漏、停电、生物安全等
- 持证作业: 电工、特种作业人员持证, 年度复审
- 安全检查: 每月安全检查, 发现隐患及时整改
@@END_LIST@@

@@P@@<strong>注意</strong>: 本章为可研阶段的初步安全设计, 不能替代正式的安全评价(安评)和职业卫生评价。建议项目立项后委托具有相应资质的机构开展专项安评和职业卫生评价。
</script>

<script type="text/njk-template" id="tpl-ch16">@@H1@@第 16 章 结论与建议

@@H2@@16.1 项目可行性结论

@@H3@@16.1.1 工艺技术上可行性

@@P@@本项目采用循环水养殖(RAS)工艺, 该工艺在挪威、丹麦、苏格兰等国家已有 20+ 年的工业应用历史, 国内莱州、舟山、福建等地也已有大量成熟项目实施。本项目工艺路线为主流串联+旁路并联混合架构, 配置 {{ farm.totalSubSystems }} 套独立循环模块和 N+1 备用设备, 关键工艺参数(物料平衡、设备选型、热平衡)严格按照国际公开文献和工业实测数据校准。

@@P@@<strong>结论: 工艺技术上完全可行</strong>。

@@H3@@16.1.2 经济财务上可行性

@@P@@本项目财务评价主要指标:

@@TABLE@@
指标|数值|基准|结论

全投资 NPV|{{ finance.indicators.npvTotal|wan }} 万元|≥ 0|{{ '满足' if finance.indicators.npvTotal >= 0 else '不满足' }}

盈亏平衡点|{{ finance.indicators.bepPct|round(1) }}% 满产|≤ 75%|{{ '安全裕度大' if finance.indicators.bepPct < 75 else '需关注' }}
@@END_TABLE@@

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}
@@P@@<strong>结论: 经济财务上可行</strong>。本项目盈利能力较好, 投资回收期合理, 抗风险能力强, 满足基准收益率要求。
{% else %}
@@P@@<strong>结论: 经济财务上财务可行性不足</strong>。建议优化售价、投资规模或运营成本后重新评估。
{% endif %}

@@H3@@16.1.3 社会环境上可行性

@@P@@本项目通过封闭循环水养殖, 实现 85-95% 水循环利用, 用水量仅为传统流水养殖的 5-10%, 显著减少对天然水资源的消耗。废水集中处理后达标排放, 几乎无面源污染, 符合"绿色发展、高质量发展"的国家战略导向。项目正常运营后可带动直接就业、间接拉动饲料/物流/销售等上下游产业, 为地方经济和食品安全保障作出贡献。

@@P@@<strong>结论: 社会环境上可行</strong>, 符合现代渔业和绿色农业发展方向。

@@H2@@16.2 关键问题与建议

@@H3@@16.2.1 售价波动是项目最大风险

{% set top1 = finance.tables.sensitivity[0] %}
@@P@@敏感性分析显示, 项目对 <strong>{{ top1.label }}</strong> 最为敏感, IRR 摆动达 {{ (top1.irrSwing*100)|round(1) }}%。{% if '售价' in top1.label %}这意味着如果实际售价比预期低 20%, 项目 IRR 将从 {{ (finance.indicators.irrTotal*100)|round(1) }}% 跌至 {{ (top1.irrLow*100)|round(1) }}%, 可能跌破基准折现率, 项目变得勉强可行。

@@P@@<strong>建议</strong>: 项目实施前, 业主应优先与下游核心客户(超市、餐饮连锁、出口商)签订<strong>3-5 年长期供货协议</strong>, 锁定基础销量和最低保护价, 规避市场价格波动对项目财务的冲击。同时探索中高端品牌建设, 通过有机认证、地理标志、生态养殖标签等溢价手段提升单价。{% endif %}

@@H3@@16.2.2 BF 启动期是项目实施关键

@@P@@RAS 系统的生物滤池(MBBR)启动需要 4-8 周培菌期, 这段时间硝化菌群从无到有逐步建立, TAN 处理能力从 0 逐步提升到设计值。如果急于满负荷投鱼, 会导致 TAN 暴涨, 大量死鱼。

@@P@@<strong>建议</strong>: 严格按照"先培菌 → 低负荷投鱼 → 逐步加负荷"的启动节奏:

@@LIST@@
- 第 1-4 周: 空池培菌, 投加菌剂 + NH₄Cl
- 第 4-6 周: TAN < 0.5、NO₂ < 0.3 持续 3 天后视为成熟
- 第 6-8 周: 放容量 20-30% 的鱼苗
- 第 8-12 周: 每周加负荷 15-20%
- 第 12 周后: 满负荷生产
@@END_LIST@@

@@P@@这个 12 周的启动期已包含在投产爬坡假设(第 1 年达产 {{ (finance.params.ramp1*100)|round(0) }}%)中, 但实际项目操作中容易急于求成, 应严守启动节奏。

@@H3@@16.2.3 关键设备 N+1 备用必须落实

@@P@@RAS 系统对设备可靠性要求极高: 主泵故障 30 分钟可能导致 DO 降至致死阈值; BF 风机故障 2 小时可能导致硝化菌群崩溃; 液氧供应中断 1 小时可能直接死鱼。本项目工艺方案已配置 N+1 备用 + 自动切换, 但实际工程招标采购时务必落实, 不应为节省投资而取消备用机。

@@P@@<strong>建议</strong>: 关键备用设备清单:

@@LIST@@
- 主循环泵: N+1 配置, 自动切换 ≤ 30 秒
- BF 罗茨风机: N+1 配置, 切换 ≤ 60 秒
- 转鼓微滤机: N+1 配置(本项目已含)
- 液氧站: 双气瓶 + 备用气源
- 应急发电机: 全场 100% 负荷, 30 秒自动启动
- UV 灯: 100% 备灯库存
@@END_LIST@@

@@H3@@16.2.4 重视生物安全

@@P@@RAS 封闭系统天然有较高生物安全, 但一旦病原体进入, 在循环水中传播极快。本项目应建立完整的生物安全 SOP:

@@LIST@@
- 进水必须 UV 60 mJ/cm² 或臭氧 0.5 mg/L 残留 5 分钟消毒
- 工人换工作服+靴子, 经消毒脚池
- 不同模块工具不混用, 颜色编码
- 新购鱼苗隔离观察 2-4 周
- 病鱼立即隔离, 病死鱼深埋或焚烧
@@END_LIST@@

@@H3@@16.2.5 加强人才培养

@@P@@RAS 是技术密集型行业, 操作人员需要兼具水产养殖和水处理工程双重知识。本项目建议人员配置中, 至少配 1-2 名有 RAS 实操经验的技术骨干(可从国内成熟 RAS 企业引进或定向培养), 其他操作工岗前接受系统培训(建议 2-3 个月)。

@@H2@@16.3 编制单位综合建议

@@P@@基于以上分析, 编制单位({{ project.editor }})对本项目的综合建议如下:

{% if finance.indicators.irrTotal >= finance.params.discount and finance.indicators.npvTotal >= 0 %}

@@P@@<strong>2. 落实关键风险管控措施</strong>:

@@LIST@@
- 销售: 项目实施前与核心客户签订长期供货协议, 锁定 60-70% 满产产能

- 委托有资质机构开展正式环境影响评价
- 委托勘察设计单位开展工程详细设计(本可研为概算阶段, 精度 ±40%)

@@END_LIST@@

{% else %}
@@P@@<strong>1. 暂缓立项, 优先优化方案</strong>。本项目工艺技术上可行, 但财务指标不足以支撑投资决策。建议从以下方向优化:

// =============================================================================
//   数据加载
// =============================================================================

function tryLoadData() {
  try {
    const stashed = localStorage.getItem(SHARE_KEY) || sessionStorage.getItem(SHARE_KEY);
    if (stashed) {
      STATE.data = JSON.parse(stashed);
      // 用完即清, 防陈旧数据
      try { localStorage.removeItem(SHARE_KEY); } catch(e) {}
      try { sessionStorage.removeItem(SHARE_KEY); } catch(e) {}
      return true;
    }
  } catch(e) { console.warn('数据加载失败:', e); }
  return false;
}

function loadFormFromStorage() {
  try {
    const saved = localStorage.getItem(FORM_KEY);
    if (saved) STATE.form = JSON.parse(saved);
  } catch(e) {}
  if (!STATE.form) STATE.form = {};
}

function saveFormToStorage() {
  try { localStorage.setItem(FORM_KEY, JSON.stringify(STATE.form || {})); } catch(e) {}
}

// =============================================================================
//   UI 渲染
// =============================================================================

function bootstrap() {
  loadFormFromStorage();

  if (!STATE.data) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><div class="big">⚠️</div>' +
      '<div>未能加载方案数据</div>' +
      '<div style="margin-top: 8px; font-size: 11px; color: #64748b;">请到 iRAS 主页面填好方案后点击 <strong>📄 生成可研报告</strong></div>' +
      // v1.5 Bug 37: 加 JSON 文件加载入口
      '<div style="margin-top: 18px; font-size: 13px; color: #94a3b8;">或将主页面下载的 <code>iRAS_可研报告数据_*.json</code> 拖入此区域 / 点击下方按钮选择文件</div>' +
      '<div style="margin-top: 12px;">' +
      '  <label style="display: inline-block; padding: 8px 16px; background: #0ea5e9; color: white; border-radius: 6px; cursor: pointer;">' +
      '    📂 选择 JSON 文件' +
      '    <input type="file" id="inpLoadJson" accept=".json,application/json" style="display: none;">' +
      '  </label>' +
      '</div>' +
      '</div>';
    // 绑定 JSON 加载
    setTimeout(() => {
      const fi = document.getElementById('inpLoadJson');
      if (fi) {
        fi.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const parsed = JSON.parse(ev.target.result);
              // Bug 46: schema 验证
              if (!parsed.pidSchema && !(parsed.results && parsed.results.summary && parsed.results.summary.finance)) {
                alert('JSON 格式不识别. 请确认这是从主页面下载的「可研报告数据」备份, 不是「保存方案」原始 JSON.');
                return;
              }
              STATE.data = parsed;
              bootstrap();
            } catch (err) { alert('JSON 解析失败: ' + err.message); }
          };
          reader.readAsText(file);
        });
      }
    }, 0);
    return;  // 没数据就停, 不渲染主体
  }

  // 元信息行
  document.getElementById('metaLine').textContent =
    `${STATE.data.speciesName || STATE.data.species} · 年产 ${STATE.data.yieldTons} t · ` +
    `保存时间 ${new Date(STATE.data.savedAt).toLocaleString('zh-CN')}`;

  // 渲染主内容
  renderMain();
}

function renderMain() {
  const main = document.getElementById('mainContent');
  let html = '';

  // 方案概要
  html += renderSummaryBox();

  // 章节列表预览
  html += renderChapterList();

  // 20 字段表单
  html += renderForm();

  // 操作区
  html += renderActionBar();

  main.innerHTML = html;

  // 绑定事件
  bindFormEvents();
  bindGroupToggle();
  bindActionButtons();
}

function renderSummaryBox() {
  const d = STATE.data;

    <div class="row">鱼种: <strong>${d.speciesName || d.species}</strong> · 产量 <strong>${d.yieldTons} t/年</strong> · ${d.stages.length} 阶段</div>
    <div class="row">CAPEX 工程总投资: <strong>${fmt.wan(fin.totalCapexProject)} 万元</strong> · 年 OPEX <strong>${fmt.wan(fin.annualOpex)} 万元</strong> · 年折旧 <strong>${fmt.wan(fin.annualDep)} 万元</strong></div>
    <div class="row">综合成本: <strong>${fin.costPerKg.toFixed(2)} 元/kg</strong>(其中折旧 ${fin.depPerKg.toFixed(2)} 元/kg)</div>

function renderChapterList() {
  let html = '<div class="chapter-list"><div style="font-size:13px; color:#a5b4fc; font-weight:600; margin-bottom:8px;">📖 报告章节(16 章扩展版,发改委可研规范)</div>';
  CHAPTERS.forEach(ch => {

    const status = ch.ready ? '✓ 自动生成' : '⏳ 占位章节';
    html += `<div class="chapter-item ${cls}">
      <span class="name">第 ${ch.num} 章 ${ch.title}</span>

  });
  html += `<div style="font-size:11px; color:#64748b; margin-top:8px; padding-top:8px; border-top:1px dashed #475569;">

  </div></div>`;

function renderForm() {
  let html = '<h2 style="margin-top: 24px;">📋 项目元数据(20 字段)</h2>';
  html += '<div style="font-size:11px; color:#94a3b8; margin-bottom:12px;">填写项目相关信息. 标 <span style="color:#ef4444;">*</span> 为必填.  本表单自动保存到本地,下次打开自动恢复.</div>';
  FORM_FIELDS.forEach(group => {
    const collapsed = group.collapsed ? 'collapsed' : '';
    html += `<div class="form-group ${collapsed}" data-group="${group.group}">
      <div class="form-group-header">
        <span class="form-group-title">${group.title}</span>
        <span><span class="form-group-status" data-group-status="${group.group}"></span><span class="form-group-toggle"></span></span>
      </div>
      <div class="form-group-body">`;
    group.fields.forEach(f => {
      const wide = f.wide ? 'field-wide' : '';
      const required = f.required ? '<span class="required">*</span>' : '';
      const hint = f.hint ? `<span class="hint">${f.hint}</span>` : '';
      const value = STATE.form[f.key] !== undefined ? String(STATE.form[f.key]).replace(/"/g,'&quot;') : '';
      let input;
      if (f.type === 'select') {
        const opts = (f.options || []).map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('');
        input = `<select id="f_${f.key}" data-key="${f.key}"><option value="">--请选择--</option>${opts}</select>`;
      } else if (f.type === 'textarea') {
        input = `<textarea id="f_${f.key}" data-key="${f.key}" placeholder="${f.placeholder || ''}">${value}</textarea>`;
      } else {
        const type = f.type || 'text';
        input = `<input id="f_${f.key}" data-key="${f.key}" type="${type}" value="${value}" placeholder="${f.placeholder || ''}">`;
      }
      html += `<div class="field ${wide}">
        <label for="f_${f.key}">${f.label}${required}${hint}</label>
        ${input}
      </div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

function renderActionBar() {
  return `<div class="action-bar">
    <button class="btn-primary" id="btnGenerate">📄 生成可研报告 (.docx)</button>
    <div class="hint">报告将以结构化内容形式生成, 用户拿到后可复制粘贴到自己的 Word 模板中. 第一阶段仅完整输出第 13 章, 其余章节为占位.</div>
  </div>`;
}

// =============================================================================
//   表单事件
// =============================================================================

function bindFormEvents() {
  document.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('input', (ev) => {
      const k = ev.target.dataset.key;
      let v = ev.target.value;
      if (ev.target.type === 'number') v = parseFloat(v) || null;
      STATE.form[k] = v;
      saveFormToStorage();
      updateGroupStatus();
    });
  });
  updateGroupStatus();
}

function updateGroupStatus() {
  FORM_FIELDS.forEach(group => {
    const total = group.fields.length;
    const filled = group.fields.filter(f => {
      const v = STATE.form[f.key];
      return v !== undefined && v !== null && v !== '';
    }).length;
    const el = document.querySelector(`[data-group-status="${group.group}"]`);
    if (el) {
      el.textContent = `${filled}/${total}`;
      el.className = 'form-group-status' + (filled === total ? ' complete' : '');
    }
  });
}

function bindGroupToggle() {
  document.querySelectorAll('.form-group-header').forEach(h => {
    h.addEventListener('click', () => {
      h.parentElement.classList.toggle('collapsed');
    });
  });
}

function bindActionButtons() {
  document.getElementById('btnGenerate').addEventListener('click', generateReport);
}

// =============================================================================
//   状态条
// =============================================================================

function setStatus(msg, kind) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar visible' + (kind ? ' ' + kind : '');
}
function clearStatus() {
  document.getElementById('statusBar').className = 'status-bar';
}

// =============================================================================
//   数字格式化
// =============================================================================

const fmt = {
  wan:  v => isFinite(v) ? (v / 10000).toLocaleString('zh-CN', { maximumFractionDigits: 1 }) : '—',
  num:  (v, d) => isFinite(v) ? v.toLocaleString('zh-CN', { maximumFractionDigits: d || 0 }) : '—'
};

// =============================================================================
//   SVG 图表生成
// =============================================================================

// 转义 XML 特殊字符
function xmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

// 工艺流程示意图(简化版 P&ID, 800×500 视图)
function buildProcessFlowSvg(ctx) {
  const wf = ctx.workflow || {};
  const f = ctx.farm || {};
  const W = 1200, H = 500;
  const boxW = 140, boxH = 60, gap = 30;

  // 主流程节点
  const main = [
    { tag: 'T-101', name: '鱼池',     fill: '#dbeafe' },
    { tag: 'F-201', name: '微滤机',   fill: '#fef3c7' },
    { tag: 'B-301', name: '生物滤池', fill: '#d1fae5' },
    { tag: 'D-401', name: 'UV 消毒',  fill: '#e0e7ff' },
    { tag: 'C-501', name: 'CO₂ 脱气', fill: '#f3e8ff' },
    { tag: 'A-601', name: '增氧锥',   fill: '#fce7f3' }
  ];

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" font-family="SimHei, Microsoft YaHei, sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1 L8 5 L2 9" fill="none" stroke="#475569" stroke-width="1.5"/>
  </marker>
</defs>
<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>
<text x="${W/2}" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">${xmlEscape((f.speciesName || '') + ' ' + (f.yieldTons || 0) + ' t/年 工艺流程示意图')}</text>
<text x="${W/2}" y="52" text-anchor="middle" font-size="13" fill="#64748b">设计阶段: ${xmlEscape(wf.designStageName || '成鱼期')} | 峰值流量 ${(f.peakFlowM3H || 0).toFixed(0)} m³/h | 系统总水体 ${(f.totalSystemVolume || 0).toFixed(0)} m³</text>`;

  // 主流程方框 + 连线 (居中布置)
  const mainY = 130;
  const totalMainW = main.length * boxW + (main.length - 1) * gap;
  const mainX0 = (W - totalMainW) / 2;
  main.forEach((node, i) => {
    const x = mainX0 + i * (boxW + gap);
    svg += `
<rect x="${x}" y="${mainY}" width="${boxW}" height="${boxH}" rx="4" fill="${node.fill}" stroke="#334155" stroke-width="1.5"/>
<text x="${x + boxW/2}" y="${mainY + 25}" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">${xmlEscape(node.tag)}</text>
<text x="${x + boxW/2}" y="${mainY + 45}" text-anchor="middle" font-size="13" fill="#334155">${xmlEscape(node.name)}</text>`;
    // 连线 (除最后一个)
    if (i < main.length - 1) {
      svg += `<line x1="${x + boxW}" y1="${mainY + boxH/2}" x2="${x + boxW + gap}" y2="${mainY + boxH/2}" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>`;
    }
  });

  // 主流程到鱼池循环回流
  const lastBox = mainX0 + (main.length - 1) * (boxW + gap) + boxW;
  const firstBox = mainX0;
  svg += `
<line x1="${lastBox}" y1="${mainY + boxH + 5}" x2="${lastBox}" y2="${mainY + boxH + 30}" stroke="#475569" stroke-width="2"/>
<line x1="${lastBox}" y1="${mainY + boxH + 30}" x2="${firstBox - 15}" y2="${mainY + boxH + 30}" stroke="#475569" stroke-width="2"/>
<line x1="${firstBox - 15}" y1="${mainY + boxH + 30}" x2="${firstBox - 15}" y2="${mainY + boxH/2}" stroke="#475569" stroke-width="2"/>
<line x1="${firstBox - 15}" y1="${mainY + boxH/2}" x2="${firstBox}" y2="${mainY + boxH/2}" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
<text x="${(lastBox + firstBox)/2}" y="${mainY + boxH + 50}" text-anchor="middle" font-size="11" fill="#64748b">主循环 ${(f.peakFlowM3H || 0).toFixed(0)} m³/h</text>`;

  // 旁路单元 (启用的)
  const branches = [];
  if (wf.skimmer && wf.skimmer.enabled) branches.push({ tag: 'S-701', name: '蛋白分离', pct: (wf.skimmer.flowPct||0).toFixed(0) + '%' });
  if (wf.denitri && wf.denitri.enabled) branches.push({ tag: 'R-801', name: '反硝化',   pct: (wf.denitri.flowPct||0).toFixed(0) + '%' });
  if (wf.aop     && wf.aop.enabled)     branches.push({ tag: 'X-901', name: 'AOP',      pct: (wf.aop.flowPct||0).toFixed(0) + '%' });

  const branchY = mainY + boxH + 90;
  if (branches.length > 0) {
    svg += `<text x="${W/2}" y="${branchY - 10}" text-anchor="middle" font-size="13" fill="#64748b" font-weight="bold">旁路单元(分流处理)</text>`;
    const bTotalW = branches.length * boxW + (branches.length - 1) * gap;
    const bX0 = (W - bTotalW) / 2;
    branches.forEach((b, i) => {
      const x = bX0 + i * (boxW + gap);
      svg += `
<rect x="${x}" y="${branchY}" width="${boxW}" height="${boxH}" rx="4" fill="#fce7f3" stroke="#be185d" stroke-width="1.5" stroke-dasharray="4 2"/>
<text x="${x + boxW/2}" y="${branchY + 22}" text-anchor="middle" font-size="13" font-weight="bold" fill="#831843">${xmlEscape(b.tag)}</text>

<text x="${tblX + 10}" y="${tblY + 54}" font-size="11" fill="#475569">BF: ${(wf.bf && wf.bf.volume || 0).toFixed(0)} m³ 填料, ${(wf.bf && wf.bf.tanEff || 0).toFixed(0)}% TAN 去除</text>
<text x="${tblX + 10}" y="${tblY + 70}" font-size="11" fill="#475569">UV: ${(wf.uv && wf.uv.dose || 0).toFixed(0)} mJ/cm², ${(wf.uv && wf.uv.powerKw || 0).toFixed(1)} kW</text>
<text x="${tblX + 10}" y="${tblY + 86}" font-size="11" fill="#475569">增氧: ${wf.aerator && wf.aerator.enabled ? '液氧 + 锥形塔' : '空气曝气'}, 峰值 ${(wf.aerator && wf.aerator.peakSupplyKgH || 0).toFixed(1)} kg O₂/h</text>`;

  svg += `\n</svg>`;
  return svg;
}

// 敏感性 Tornado 图 (基于 finance.tables.sensitivity)
function buildTornadoSvg(ctx) {
  const sens = (ctx.finance && ctx.finance.tables && ctx.finance.tables.sensitivity) || [];
  const baseIRR = (ctx.finance && ctx.finance.indicators && ctx.finance.indicators.irrTotal) || 0;
  const W = 800, H = 60 + sens.length * 50 + 60;
  const margin = { left: 130, right: 60, top: 70, bottom: 40 };
  const chartW = W - margin.left - margin.right;
  const barH = 28;
  const rowH = 50;

  // 横轴范围
  let minIRR = baseIRR, maxIRR = baseIRR;
  sens.forEach(f => {
    minIRR = Math.min(minIRR, f.irrLow, f.irrHigh);
    maxIRR = Math.max(maxIRR, f.irrLow, f.irrHigh);
  });
  const range = maxIRR - minIRR || 0.01;
  minIRR -= range * 0.1; maxIRR += range * 0.1;
  const xScale = irr => margin.left + ((irr - minIRR) / (maxIRR - minIRR)) * chartW;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" font-family="SimHei, Microsoft YaHei, sans-serif">
<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>
<text x="${W/2}" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">敏感性分析 — 全投资 IRR Tornado 图</text>
<text x="${W/2}" y="50" text-anchor="middle" font-size="13" fill="#64748b">基准 IRR ${(baseIRR*100).toFixed(2)}% (虚线), 各因子 ±20% 摆动</text>`;

  // 基准线
  const x0 = xScale(baseIRR);
  svg += `<line x1="${x0}" y1="${margin.top - 10}" x2="${x0}" y2="${H - margin.bottom + 5}" stroke="#374151" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  svg += `<text x="${x0}" y="${H - margin.bottom + 22}" text-anchor="middle" font-size="11" fill="#374151">基准 ${(baseIRR*100).toFixed(1)}%</text>`;

  // 横轴刻度
  for (let i = 0; i <= 5; i++) {
    const v = minIRR + (maxIRR - minIRR) * i / 5;
    const x = xScale(v);
    svg += `<line x1="${x}" y1="${H - margin.bottom}" x2="${x}" y2="${H - margin.bottom + 4}" stroke="#94a3b8"/>`;
    svg += `<text x="${x}" y="${H - margin.bottom + 18}" text-anchor="middle" font-size="10" fill="#64748b">${(v*100).toFixed(1)}%</text>`;
  }
  // 横轴线
  svg += `<line x1="${margin.left}" y1="${H - margin.bottom}" x2="${margin.left + chartW}" y2="${H - margin.bottom}" stroke="#94a3b8"/>`;

  // 各因子条
  sens.forEach((f, i) => {
    const y = margin.top + i * rowH + (rowH - barH) / 2;
    const xLow = xScale(f.irrLow);
    const xHigh = xScale(f.irrHigh);
    const xLeft = Math.min(xLow, xHigh);
    const xRight = Math.max(xLow, xHigh);

    svg += `<rect x="${xLeft}" y="${y}" width="${xRight - xLeft}" height="${barH}" fill="#6366f1" opacity="0.85" stroke="#312e81" stroke-width="1"/>`;
    svg += `<text x="${margin.left - 10}" y="${y + barH/2 + 4}" text-anchor="end" font-size="12" fill="#1e293b" font-weight="bold">${xmlEscape(f.label)}</text>`;
    // 端点数值
    svg += `<text x="${xLeft - 4}" y="${y + barH/2 + 4}" text-anchor="end" font-size="10" fill="#475569">${(f.irrLow*100).toFixed(1)}%</text>`;
    svg += `<text x="${xRight + 4}" y="${y + barH/2 + 4}" text-anchor="start" font-size="10" fill="#475569">${(f.irrHigh*100).toFixed(1)}%</text>`;
    // 摆动值在条中央
    svg += `<text x="${(xLeft+xRight)/2}" y="${y + barH/2 + 4}" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">摆动 ${(f.irrSwing*100).toFixed(1)}%</text>`;
  });

  svg += `\n</svg>`;
  return svg;
}

// 累计现金流曲线图(全投资 + 自有资金双线)
function buildCashflowSvg(ctx) {
  const cf = (ctx.finance && ctx.finance.tables && ctx.finance.tables.cashflowTotal) || [];
  if (cf.length === 0) return '';
  const W = 800, H = 420;
  const margin = { left: 80, right: 60, top: 70, bottom: 60 };
  const chartW = W - margin.left - margin.right;
  const chartH = H - margin.top - margin.bottom;

  // 数据范围(用 cumTotal 和 cumEquity)
  let yMin = 0, yMax = 0;
  cf.forEach(p => {
    if (p.cumTotal != null) { yMin = Math.min(yMin, p.cumTotal); yMax = Math.max(yMax, p.cumTotal); }
    if (p.cumEquity != null) { yMin = Math.min(yMin, p.cumEquity); yMax = Math.max(yMax, p.cumEquity); }
  });
  const yRange = yMax - yMin || 1;
  yMin -= yRange * 0.1; yMax += yRange * 0.1;
  const xMax = cf[cf.length - 1].year;

  const xScale = t => margin.left + (t / xMax) * chartW;
  const yScale = v => margin.top + chartH - ((v - yMin) / (yMax - yMin)) * chartH;

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" font-family="SimHei, Microsoft YaHei, sans-serif">
<rect x="0" y="0" width="${W}" height="${H}" fill="#fff"/>
<text x="${W/2}" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">累计净现金流量曲线</text>
<text x="${W/2}" y="50" text-anchor="middle" font-size="13" fill="#64748b">${ctx.farm.speciesName} ${ctx.farm.yieldTons} t/年, 项目年限 ${cf.length - 1} 年</text>`;

  // 横轴
  for (let t = 0; t <= xMax; t += Math.max(1, Math.floor(xMax/8))) {
    const x = xScale(t);
    svg += `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${margin.top + chartH}" stroke="#e2e8f0"/>`;
    svg += `<text x="${x}" y="${margin.top + chartH + 18}" text-anchor="middle" font-size="10" fill="#64748b">第${t}年</text>`;
  }
  // 纵轴 (5 等分)
  for (let i = 0; i <= 5; i++) {
    const v = yMin + (yMax - yMin) * i / 5;
    const y = yScale(v);
    svg += `<line x1="${margin.left}" y1="${y}" x2="${margin.left + chartW}" y2="${y}" stroke="#e2e8f0"/>`;
    svg += `<text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" font-size="10" fill="#64748b">${(v/10000).toFixed(0)}</text>`;
  }
  svg += `<text x="${margin.left - 60}" y="${margin.top + chartH/2}" text-anchor="middle" font-size="11" fill="#64748b" transform="rotate(-90 ${margin.left - 60} ${margin.top + chartH/2})">累计净现金流(万元)</text>`;

  // 0 轴线
  if (yMin < 0 && yMax > 0) {
    const y0 = yScale(0);
    svg += `<line x1="${margin.left}" y1="${y0}" x2="${margin.left + chartW}" y2="${y0}" stroke="#374151" stroke-width="1.5"/>`;
  }

  // 全投资曲线
  const totalPath = cf.map((p, i) => {
    const x = xScale(p.year);
    const y = yScale(p.cumTotal || 0);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
  }).join(' ');
  svg += `<path d="${totalPath}" fill="none" stroke="#dc2626" stroke-width="2.5"/>`;

  // 自有资金曲线
  const equityPath = cf.map((p, i) => {
    const x = xScale(p.year);
    const y = yScale(p.cumEquity || 0);
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1);
  }).join(' ');
  svg += `<path d="${equityPath}" fill="none" stroke="#059669" stroke-width="2.5" stroke-dasharray="6 3"/>`;

  // 数据点
  cf.forEach(p => {
    if (p.year % 2 === 0 || p.year === xMax) {
      svg += `<circle cx="${xScale(p.year)}" cy="${yScale(p.cumTotal || 0)}" r="3" fill="#dc2626"/>`;
      svg += `<circle cx="${xScale(p.year)}" cy="${yScale(p.cumEquity || 0)}" r="3" fill="#059669"/>`;
    }
  });

  // 图例
  const legendX = margin.left + 20;
  const legendY = margin.top + 15;
  svg += `<line x1="${legendX}" y1="${legendY}" x2="${legendX + 28}" y2="${legendY}" stroke="#dc2626" stroke-width="2.5"/>`;
  svg += `<text x="${legendX + 35}" y="${legendY + 4}" font-size="12" fill="#1e293b">全投资</text>`;
  svg += `<line x1="${legendX + 90}" y1="${legendY}" x2="${legendX + 118}" y2="${legendY}" stroke="#059669" stroke-width="2.5" stroke-dasharray="6 3"/>`;
  svg += `<text x="${legendX + 125}" y="${legendY + 4}" font-size="12" fill="#1e293b">自有资金</text>`;

  svg += `\n</svg>`;
  return svg;
}

// =============================================================================
//   SVG → PNG → Uint8Array (浏览器侧)
// =============================================================================

async function svgToPngBytes(svgString, width, height) {
  return new Promise((resolve, reject) => {
    try {
      const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const dpr = 2; // 高清渲染
        const canvas = document.createElement('canvas');
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        URL.revokeObjectURL(url);
        canvas.toBlob(b => {
          if (!b) return reject(new Error('canvas.toBlob 失败'));
          b.arrayBuffer().then(ab => resolve(new Uint8Array(ab)));
        }, 'image/png');
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('SVG 加载失败'));
      };
      img.src = url;
    } catch(e) { reject(e); }
  });
}

// =============================================================================
//   Context 拼装 — 把 iRAS 数据 + 表单数据整合成模板渲染所需的对象
// =============================================================================

function buildContext() {
  const d = STATE.data;
  const f = STATE.form || {};
  const fin = d.results.summary.finance;

  // ------- project 命名空间 -------
  const project = {
    name:                 f.projectName || '(未填项目名)',
    code:                 f.projectCode || '',
    owner:                f.ownerName || '(未填业主)',
    ownerCreditCode:      f.ownerCreditCode || '',
    location: {
      province: f.locProvince || '',
      city:     f.locCity || '',
      district: f.locDistrict || '',
      address:  f.locAddress || '',
      full:     [f.locProvince, f.locCity, f.locDistrict, f.locAddress].filter(x => x).join(' ')
    },
    nature:               f.projectNature || '新建',
    editor:               f.editorName || '(未填编制单位)',
    editDate:             f.editDate || new Date().toISOString().slice(0,10),
    ownerLegalRep:        f.ownerLegalRep || '',
    ownerContact:         f.ownerContact || '',
    ownerPhone:           f.ownerPhone || '',
    ownerEstablishedDate: f.ownerEstablishedDate || '',
    ownerCapital:         f.ownerCapital || 0,
    ownerBusiness:        f.ownerBusiness || '',
    landArea:             f.landArea || 0,
    landNature:           f.landNature || '',
    landAcquisition:      f.landAcquisition || '',
    upperPlanName:        f.upperPlanName || '',
    editorQualification:  f.editorQualification || '',
    editorBasis:          f.editorBasis || ''
  };

  // ------- farm 命名空间 -------
  const farm = {
    species:        d.species,
    speciesName:    d.speciesName,
    yieldTons:      d.yieldTons,
    stages:         (d.stages || []).map((s, i) => {
      const ps = (d.results.perStage || [])[i] || {};
      const psFlow = ps.flow || {};
      const psLoad = ps.load || {};
      const psFarm = ps.farm || {};
      // 反推单池直径: D = sqrt(4V / (π × H × 池数))
      const poolCount = (s.subSystemCount || 1) * (s.poolsPerSet || 1);
      const poolDepth = s.poolDepth_m || s.recDepth_m || 1.5;
      const totalVol  = psFarm.volume || 0;
      const D = (totalVol > 0 && poolDepth > 0 && poolCount > 0) ?
                Math.sqrt(4 * totalVol / poolCount / Math.PI / poolDepth) : 0;
      return {
        name:           s.name,
        weightStart:    s.weightStart,
        weightEnd:      s.weightEnd,
        months:         s.months,
        density:        s.density,
        tempOpt:        s.tempOpt,
        salinity:       s.salinity || 0,
        subSystemCount: s.subSystemCount || 1,
        poolsPerSet:    s.poolsPerSet || 1,
        poolCount:      poolCount,
        poolDepth_m:    poolDepth,
        poolDiameter:   Math.round(D * 10) / 10,
        biomass:        psFarm.biomass || 0,
        volume:         psFarm.volume || 0,
        volumeTotal:    psFlow.volumeTotal || psFarm.volume || 0,
        flowM3h:        psFlow.flowMain || 0,
        turnover:       psFlow.turnover || 0,
        feedDailyMax:   psLoad.feedMax || 0,
        feedDailyAvg:   psLoad.feedAvg || 0,
        tanDaily:       psLoad.tanDaily || 0,
        tssDaily:       psLoad.tssDaily || 0,
        domDaily:       psLoad.domDaily || 0,
        co2Daily:       psLoad.co2Daily || 0,
        o2DailyTotal:   psLoad.o2DailyTotal || 0,
        FCR:            s.FCR || 0,    // v1.5 Bug 30 修复: 字段名是 FCR (大写), 不是 fcr
        protein:        s.protein || 0,
        feedRate:       s.feedRate || 0,
        mortality:      s.mortality || 0
      };
    }),
    designStage:        d.results.summary.designStage || '',
    peakFlowM3H:        d.results.summary.peakFlowM3H || 0,
    totalSystemVolume:  d.results.summary.totalSystemVolume || 0,
    totalLOXKgD:        d.results.summary.totalLOXKgD || 0,
    // v1.6: 液氧储罐配置 (站级设备, 全场共用); 老数据无 siteEquipment 时用 fallback
    oxygenTank: (function(){
      const s = d.results.summary;
      if (s && s.siteEquipment && s.siteEquipment.oxygenTank) return s.siteEquipment.oxygenTank;
      // fallback: 老方案没有 siteEquipment 字段, 用默认 3t × 2 罐
      return { size_t: 3, count: 2, storage_t: 6, reserveDays: 0, unitPrice: 100000, totalCapex: 200000 };
    })()
  };

  // 累加全场总值
  farm.totalBiomass    = farm.stages.reduce((s, x) => s + (x.biomass || 0), 0);
  farm.totalVolumeTank = farm.stages.reduce((s, x) => s + (x.volume || 0), 0);
  farm.totalFeedDaily  = farm.stages.reduce((s, x) => s + (x.feedDailyMax || 0), 0);
  farm.totalMonths     = farm.stages.reduce((s, x) => s + (x.months || 0), 0);
  farm.totalSubSystems = farm.stages.reduce((s, x) => s + (x.subSystemCount || 0), 0);
  farm.totalPools      = farm.stages.reduce((s, x) => s + (x.poolCount || 0), 0);
  // v1.7: 设计阶段(产能最大阶段)的系统排水 - 用真实 V_total × exchangeDaily 算, 取代 7.5% 硬编码
  //   工程意义: 每个阶段换水率不同(成鱼期 4%、苗种期 8-10%); 报告用设计阶段口径与 CAPEX 一致
  //   兼容: 老 P&ID 数据无 discharge 字段时, fallback 到 7.5% 估算
  {
    const _designPs = (d.results.perStage || [])[d.results.summary.designStageIdx || (d.results.perStage || []).length - 1] || {};
    const _disch = _designPs.discharge;
    if (_disch && _disch.V_m3_d != null) {
      farm.dischargeM3D = _disch.V_m3_d;
      farm.dischargeTSS_mg_L = _disch.TSS_mg_L || 0;
      farm.dischargeTAN_mg_L = _disch.TAN_mg_L || 0;
      farm.dischargeNO3_mg_L = _disch.NO3_mg_L || 0;
    } else {
      // fallback: 老数据按 7.5%/d 估算 (与历史口径一致)
      farm.dischargeM3D = farm.totalSystemVolume * 0.075;
      farm.dischargeTSS_mg_L = 0;
      farm.dischargeTAN_mg_L = 0;
      farm.dischargeNO3_mg_L = 0;
    }
    farm.dischargeM3Y = farm.dischargeM3D * 365;
  }
  // v1.5.1: 全场加权 FCR (按日饲料量加权, 反映平均饲料效率)
  //   各阶段 FCR 差异大 (苗种期 0.8-1.0, 成鱼期 1.2-1.4), 用饲料量加权避免被小阶段拉偏
  const _fcrWeightedSum = farm.stages.reduce((acc, x) => acc + (x.FCR || 0) * (x.feedDailyMax || 0), 0);
  farm.weightedFCR = farm.totalFeedDaily > 0 ? _fcrWeightedSum / farm.totalFeedDaily : 0;

  // v1.5: 项目用地估算 (从 buildPIDExport 直接传入)
  farm.land = (d.results.summary && d.results.summary.land) || null;

  // ------- workflow 命名空间 -------
  // 工艺方案 — 使用设计阶段(通常成鱼期)的工艺参数作为代表
  const designIdx = d.results.summary.designStageIdx || (d.results.perStage || []).length - 1;
  const designStage = (d.results.perStage || [])[designIdx] || {};
  const designEq = designStage.equipment || {};
  const sample = (d.stages || [])[designIdx] || {};
  const sproc = sample.proc || {};
  const workflow = {
    designStageName: designStage.stageName || '',
    // 主流串联单元
    rdf: designEq.rdf || {},
    bf:  designEq.bf || {},
    uv:  designEq.uv || {},
    co2: designEq.co2 || {},
    aerator: designEq.o2cone || {},
    // v1.7: 鱼池增氧鼓风机 K-101 (仅 air 模式启用; o2 模式 enabled=false)
    tankAirBlower: designEq.tankAirBlower || {},
    // 旁路单元
    skimmer: designEq.skimmer || {},
    aop:     designEq.aop || {},
    denitri: designEq.denitri || {},
    sump:    designEq.sump || {},
    // 投饵参数(用户填的,所有阶段共享的部分)
    peakFactor: sproc.peakFactor || 1.5,
    // 各阶段工艺数据(供详细表格)
    perStage: (d.results.perStage || []).map(ps => ({
      stageName: ps.stageName,
      flow: ps.flow || {},
      load: ps.load || {},
      bfVolume: (ps.equipment && ps.equipment.bf && ps.equipment.bf.volume) || 0,
      uvPowerKw: (ps.equipment && ps.equipment.uv && ps.equipment.uv.powerKw) || 0,
      totalPumpKw: (ps.pumps && ps.pumps.totalKw) || 0,
      o2DailyKgD: (ps.load && ps.load.o2DailyTotal) || 0,
      co2DailyKgD: (ps.load && ps.load.co2Daily) || 0
    })),
    // 全场关键设备汇总(供第 6 章设备方案)
    equipmentSummary: buildEquipmentSummary(d)
  };

  // ------- capex 命名空间 -------
  // v1.5 审计回合 3: Bug 2 修复后, 自有/贷款拆分不再是 totalInvestment × ownPct
  //   贷款只覆盖固定资产, 流动资金 100% 自筹. 这里也要拆开避免报告模板写错.
  const _wc = (fin.annualOpex || 0) * 0.15;
  const _fa = fin.totalCapexProject || 0;
  const _ownPct = 0.3;  // 与 finParams.ownPct 保持一致, 必要时下面 finParams 重新覆盖
  const capex = {
    equipDirect:      fin.totalCapexEquip || 0,
    civilEtc:         (fin.totalCapexProject || 0) - (fin.totalCapexEquip || 0),
    fixedAsset:       _fa,
    workingCapital:   _wc,
    totalInvestment:  _fa + _wc,
    // v1.5 审计回合 3: 暴露 finance-core 同口径字段, 模板用这些字段代替 totalInvestment × ownPct
    ownEquityFixed:   _fa * _ownPct,             // 固定资产中自有部分
    loan:             _fa * (1 - _ownPct),       // 贷款 (只覆盖固资)
    ownEquity:        _fa * _ownPct + _wc,        // 自有合计 (含流动资金)
    depYearsEquip:    d.depYearsEquip || 8,
    depYearsCivil:    d.depYearsCivil || 20,
    depAnnual:        fin.annualDep || 0
  };

  // ------- opex 命名空间 -------
  const opex = {
    totalAnnual:    fin.annualCost || 0,
    totalExclDep:   fin.annualOpex || 0,
    costPerKg:      fin.costPerKg || 0,
    depPerKg:       fin.depPerKg || 0,
    opexPerKg:      fin.opexPerKg || 0
  };

  // ------- finance 命名空间 -------
  // 从默认参数 + 数据计算 (实际 v1.5 后续可让用户在 report.html 内调财务参数)
  // v1.5 一阶段简化: 用默认财务参数 (与 finance.html 默认一致)
  const finParams = {
    price:       guessDefaultPrice(d.species),
    years:       15,
    ramp1:       0.3,
    ramp2:       0.7,
    ramp3:       1.0,
    buildYears:  1,
    workingCap:  0.15,
    ownPct:      0.3,
    loanRate:    0.05,
    loanMethod:  'equal_payment',
    loanYears:   8,
    discount:    0.08,
    taxRate:     0.25,
    salesTax:    0,
    repairRate:  0.02,
    adminRate:   0.03,
    laborCost:   estimateLaborCost(d.yieldTons) * 10000
  };
  const finCalc = calculateFinance(d, finParams);

  const finance = {
    params:     finParams,
    indicators: finCalc.indicators,
    tables:     finCalc.tables
  };

  // ------- meta 命名空间 -------
  const meta = {
    generatedAt:     new Date().toISOString(),
    irasVersion:     d.irasVersion || '1.5',
    templateVersion: 'v1.5-alpha-1',
    reportNumber:    `iRAS-${d.species}-${d.yieldTons}t-${new Date().toISOString().slice(0,10).replace(/-/g,'')}`
  };

  return { project, workflow, farm, capex, opex, finance, meta };
}

function guessDefaultPrice(species) {
  const map = {
    salmon: 60, turbot: 80, grouper: 130, perch: 50,
    mandarin: 90, tilapia: 22, eel: 110, shrimp: 55
  };
  return map[species] || 50;
}
function estimateLaborCost(yieldTons) {
  if (yieldTons < 100) return 30;
  if (yieldTons < 300) return 60;
  if (yieldTons < 1000) return 120;
  if (yieldTons < 3000) return 240;
  return 360;
}

// 全场设备汇总(供第 6 章设备方案使用)
// 返回数组: [{ category, tag, name, spec, qty, perStage: [{stage, qty, spec}] }]
function buildEquipmentSummary(d) {
  const stages = d.results.perStage || [];
  if (stages.length === 0) return [];

  // 设备分类聚合规则:每类设备一行,数量 = 各阶段 subSystemCount × 该阶段是否启用
  const list = [];
  const stageNames = stages.map(s => s.stageName);

  // 工具函数: 把多阶段同一设备汇总成一行
  function aggregate(category, getter, defaultName, specFmt) {
    const perStage = stages.map((ps, i) => {
      const item = getter(ps);
      const subSys = (d.stages[i] && d.stages[i].subSystemCount) || 1;
      const enabled = item && item.enabled !== false;
      return {
        stage: ps.stageName,
        qty: enabled ? subSys : 0,
        spec: enabled ? specFmt(item, ps) : '—',
        item: enabled ? item : null
      };
    });
    const totalQty = perStage.reduce((s, x) => s + x.qty, 0);
    if (totalQty > 0) {
      list.push({ category, tag: perStage.find(x => x.item)?.item?.tag || '', name: defaultName, perStage, totalQty });
    }
  }

  aggregate('鱼池', ps => ({ enabled: true, tag: 'T-101' }), '鱼池(含 N+1 备用)',
    (it, ps) => `${ps.farm.volume.toFixed(0)} m³ × ${ps.farm.density} kg/m³`);

  aggregate('微滤机', ps => ({ ...ps.equipment.rdf, enabled: true }), '转鼓微滤机 RDF',
    (it, ps) => `${(it.flow || ps.flow.flowMain).toFixed(0)} m³/h, 60 μm 筛网, TSS ${(it.tssEff || 0).toFixed(0)}%`);

  aggregate('生物滤池', ps => ({ ...ps.equipment.bf, enabled: true }), 'MBBR 生物滤池',
    (it, ps) => `${(it.volume || 0).toFixed(0)} m³ 填料, K1/K3, 比表面积 500 m²/m³`);

  aggregate('UV 消毒器', ps => ({ ...ps.equipment.uv, enabled: true }), 'UV 紫外消毒器',
    (it, ps) => `${(it.flow || ps.flow.flowMain).toFixed(0)} m³/h, ${it.dose || 30} mJ/cm², 中压灯`);

  aggregate('CO2 脱气塔', ps => ps.equipment.co2 || {}, 'CO₂ 脱气塔',
    (it, ps) => `逆流式, G:L=${it.gToL || 3}, 单次脱气 ${(it.eff || 65).toFixed(0)}%`);

  aggregate('增氧锥', ps => ps.equipment.o2cone || {}, '低水头增氧锥(LHO)+ 液氧站',
    (it, ps) => `供氧 ${(it.peakSupplyKgH || 0).toFixed(1)} kg/h, ${(it.satTarget || 140).toFixed(0)}% 饱和度`);

  aggregate('蛋白分离器', ps => ps.equipment.skimmer || {}, '蛋白分离器',
    (it, ps) => `${(it.volume || 0).toFixed(1)} m³, 旁路 ${(it.flowPct || 0).toFixed(0)}%, ${it.mode === 'ozone' ? '臭氧+泡沫' : '空气泡沫'}`);

  aggregate('反硝化反应器', ps => ps.equipment.denitri || {}, '反硝化反应器',
    (it, ps) => `${(it.volume || 0).toFixed(0)} m³, NO₃ 去除 ${(it.no3RemovedKgD || 0).toFixed(1)} kg/d`);

  aggregate('AOP 反应器', ps => ps.equipment.aop || {}, '高级氧化 AOP 反应器',
    (it, ps) => `${it.type || '—'}, 旁路 ${(it.flowPct || 0).toFixed(0)}%, Geosmin ${(it.geosminEff || 0).toFixed(0)}%`);

  aggregate('臭氧发生器', ps => {
    const og = ps.equipment.ozoneGen || {};
    return { ...og, enabled: og.totalKgD > 0 };
  }, '臭氧发生器',
    (it, ps) => `${(it.totalKgD || 0).toFixed(2)} kg/d, ${(it.powerKw || 0).toFixed(1)} kW`);

  aggregate('BF 风机', ps => ({ enabled: true, ...ps.equipment.bfBlower, tag: 'K-302' }), 'BF 罗茨风机',
    (it, ps) => {
      const sp = it.spec || {};
      return `风量 ${(sp.flowM3h || 0).toFixed(0)} m³/h, ${(sp.powerKw || 0).toFixed(1)} kW`;
    });

  aggregate('主循环泵', ps => ({ enabled: true, ...ps.pumps.main }), '主循环泵(含变频)',
    (it, ps) => `${(it.flow || 0).toFixed(0)} m³/h, ${(it.kw || 0).toFixed(1)} kW, 扬程 ${it.headM || 12} m`);

  aggregate('集水池', ps => ps.equipment.sump || {}, '集水池 / 缓冲池',
    (it, ps) => `${(it.volume || 0).toFixed(0)} m³, HRT ${(it.hrt_min || 0).toFixed(1)} min`);

  return list;
}


// =============================================================================
//   财务计算 (v1.5: 全部代理到 finance-core.js, Bug 6 修复)
//   提供 calculateFinance(data, p) 接口, 内部生成 tables 和 indicators
// =============================================================================
function calculateFinance(data, p) {
  if (!window.iRASFinance) {
    console.error('finance-core.js 未加载, 财务表无法生成');
    return { indicators: {}, tables: {} };
  }
  const fin = data.results.summary.finance;
  if (!fin) return { indicators: {}, tables: {} };

  const core = window.iRASFinance.calculate(data, p);
  if (!core) return { indicators: {}, tables: {} };

  // 适配旧的 tables 输出结构
  const yearly = core.yearly;
  const Y = p.years;
  const yieldKg = data.yieldTons * 1000;
  const sat = yearly[Math.min(3, Y)] || yearly[yearly.length - 1];
  const total = sat.opCostTotal + sat.dep + sat.interest;
  const pct = v => total > 0 ? (v / total * 100).toFixed(1) : '—';

  return {
    indicators: core.indicators,
    tables: {
      revenue: yearly.filter(y => y.year > 0).map(y => ({
        year: y.year, ramp: y.ramp,
        tons: yieldKg * y.ramp / 1000,
        revenue: y.revenue, salesTax: y.salesTax, netRevenue: y.netRevenue
      })),
      totalCost: {
        operatingCost: sat.operatingCost, operatingPct: pct(sat.operatingCost),
        repairCost:    sat.repairCost,    repairPct:    pct(sat.repairCost),
        adminCost:     sat.adminCost,     adminPct:     pct(sat.adminCost),
        laborCost:     sat.laborCost,     laborPct:     pct(sat.laborCost),
        dep:           sat.dep,           depPct:       pct(sat.dep),
        interest:      sat.interest,      interestPct:  pct(sat.interest),
        total,
        roi: total > 0 ? (sat.profitNet / (fin.totalCapexProject || 1) * 100) : 0
      },
      profitLoss: {
        y1: yearly[1] || {}, y2: yearly[2] || {}, y3: yearly[3] || {}, yN: yearly[Y] || {}
      },
      cashflowTotal: yearly,
      cashflowEquity: yearly,
      sensitivity: core.sensitivity ? core.sensitivity.factors : []
    }
  };
}

let nunjucksEnv = null;

function setupNunjucks() {
  if (nunjucksEnv) return nunjucksEnv;
  nunjucksEnv = new nunjucks.Environment(null, { autoescape: false });
  // 自定义过滤器
  nunjucksEnv.addFilter('wan', v => isFinite(v) ? (v / 10000).toFixed(1) : '—');
  nunjucksEnv.addFilter('pct', v => isFinite(v) ? (v * 100).toFixed(2) + '%' : '—');
  nunjucksEnv.addFilter('thousand', v => isFinite(v) ? v.toLocaleString('zh-CN') : '—');
  nunjucksEnv.addFilter('round', (v, d) => isFinite(v) ? Number(v).toFixed(d != null ? d : 0) : '—');
  return nunjucksEnv;
}

function getTemplate(id) {
  const el = document.getElementById('tpl-' + id);
  return el ? el.textContent : '';
}

function renderChapter(chapterId, ctx) {
  const tpl = getTemplate(chapterId);
  if (!tpl) return '@@H1@@(章节模板缺失: ' + chapterId + ')\n';
  try {
    return nunjucksEnv.renderString(tpl, ctx);
  } catch(e) {
    console.error('章节渲染失败 ' + chapterId + ':', e);
    return '@@H1@@(章节渲染失败: ' + chapterId + ')\n@@P@@错误: ' + e.message + '\n';
  }
}

// 懒加载 docx.js
let _docxLib = null;
async function loadDocxLibrary() {
  if (_docxLib) return _docxLib;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('docx.js 加载失败 (网络问题或 CDN 不通)'));
    document.head.appendChild(s);
  });
  if (typeof docx === 'undefined') throw new Error('docx 全局变量未注入');
  _docxLib = docx;
  return _docxLib;
}

// 把渲染后的 text 解析成 docx 的 children 数组
function parseTextToDocxChildren(text, dx, images) {
  const { Paragraph, HeadingLevel, TextRun, Table, TableRow, TableCell, WidthType, AlignmentType, BorderStyle, ImageRun } = dx;
  images = images || {};

  // 把含 <strong>...</strong> 的文本拆成 TextRun 数组(粗体片段 + 普通片段)
  function inlineRuns(s, baseOpts) {
    baseOpts = baseOpts || { size: 21, font: 'SimSun' };
    const runs = [];
    const re = /<strong>(.*?)<\/strong>/g;
    let last = 0, m;
    while ((m = re.exec(s)) !== null) {
      if (m.index > last) {
        runs.push(new TextRun({ ...baseOpts, text: s.slice(last, m.index) }));
      }
      runs.push(new TextRun({ ...baseOpts, text: m[1], bold: true }));
      last = m.index + m[0].length;
    }
    if (last < s.length) {
      runs.push(new TextRun({ ...baseOpts, text: s.slice(last) }));
    }
    return runs.length > 0 ? runs : [new TextRun({ ...baseOpts, text: s })];
  }
  const lines = text.split('\n');
  const children = [];
  let i = 0;
  while (i < lines.length) {
    let line = lines[i];
    if (!line.trim()) { i++; continue; }

    // 表格
    if (line.includes('@@TABLE@@')) {
      const rows = [];
      i++;
      while (i < lines.length && !lines[i].includes('@@END_TABLE@@')) {
        const row = lines[i].trim();
        if (row && !row.startsWith('@@SUBTOTAL@@')) {
          rows.push({ cells: row.split('|'), subtotal: false });
        } else if (row.startsWith('@@SUBTOTAL@@')) {
          rows.push({ cells: row.replace('@@SUBTOTAL@@','').split('|'), subtotal: true });
        }
        i++;
      }
      i++; // 跳过 END_TABLE
      if (rows.length > 0) {
        const tableRows = rows.map((r, idx) => new TableRow({
          children: r.cells.map(c => new TableCell({
            children: [new Paragraph({
              children: inlineRuns(c.trim(), { size: 18, font: 'SimSun', bold: idx === 0 || r.subtotal }),
              alignment: idx === 0 ? AlignmentType.CENTER : AlignmentType.LEFT
            })],
            shading: idx === 0 ? { fill: 'E0E7FF' } : (r.subtotal ? { fill: 'F1F5F9' } : undefined)
          }))
        }));
        children.push(new Table({
          rows: tableRows,
          width: { size: 100, type: WidthType.PERCENTAGE }
        }));
        children.push(new Paragraph({ children: [new TextRun(' ')] })); // 表格后空行
      }
      continue;
    }

    // 列表
    if (line.includes('@@LIST@@')) {
      i++;
      while (i < lines.length && !lines[i].includes('@@END_LIST@@')) {
        const t = lines[i].trim();
        if (t && t.startsWith('-')) {
          children.push(new Paragraph({
            children: inlineRuns(t.replace(/^-\s*/, ''), { size: 21, font: 'SimSun' }),
            bullet: { level: 0 }
          }));
        }
        i++;
      }
      i++;
      continue;
    }

    // 图片 @@IMG@@id=xxx|caption=xxx|w=800|h=400@@
    const imgMatch = line.match(/@@IMG@@([^@]*)@@/);
    if (imgMatch) {
      const params = {};
      imgMatch[1].split('|').forEach(kv => {
        const [k, v] = kv.split('=');
        if (k && v != null) params[k.trim()] = v.trim();
      });
      const id = params.id;
      const caption = params.caption || '';
      const dispW = parseInt(params.w) || 600;
      const dispH = parseInt(params.h) || 300;
      const png = images[id];
      if (png && png.length > 0 && ImageRun) {
        try {
          children.push(new Paragraph({
            children: [new ImageRun({
              data: png,
              transformation: { width: dispW, height: dispH },
              type: 'png'
            })],
            alignment: AlignmentType.CENTER,
            spacing: { before: 200, after: 100 }
          }));
          if (caption) {
            children.push(new Paragraph({
              children: [new TextRun({ text: caption, size: 18, italics: true, color: '6B7280', font: 'SimSun' })],
              alignment: AlignmentType.CENTER,
              spacing: { after: 200 }
            }));
          }
        } catch(e) {
          // 渲染失败时退化为文本提示
          children.push(new Paragraph({
            children: [new TextRun({ text: '[图片渲染失败: ' + id + ']', size: 21, color: 'DC2626' })],
            alignment: AlignmentType.CENTER
          }));
        }
      } else {
        // 图片不可用时退化为文本占位
        children.push(new Paragraph({
          children: [new TextRun({ text: '[' + (caption || '图片: ' + id) + ' — 未生成]', size: 21, italics: true, color: '94A3B8' })],
          alignment: AlignmentType.CENTER
        }));
      }
      i++; continue;
    }

    // 标题 H1
    const h1Match = line.match(/@@H1@@(.*)/);
    if (h1Match) {
      children.push(new Paragraph({
        children: [new TextRun({ text: h1Match[1].trim(), bold: true, size: 32, font: 'SimHei' })],
        heading: HeadingLevel.HEADING_1,
        spacing: { before: 400, after: 200 }
      }));
      i++; continue;
    }
    // H2
    const h2Match = line.match(/@@H2@@(.*)/);
    if (h2Match) {
      children.push(new Paragraph({
        children: [new TextRun({ text: h2Match[1].trim(), bold: true, size: 26, font: 'SimHei' })],
        heading: HeadingLevel.HEADING_2,
        spacing: { before: 300, after: 150 }
      }));
      i++; continue;
    }
    // H3
    const h3Match = line.match(/@@H3@@(.*)/);
    if (h3Match) {
      children.push(new Paragraph({
        children: [new TextRun({ text: h3Match[1].trim(), bold: true, size: 22, font: 'SimHei' })],
        heading: HeadingLevel.HEADING_3,
        spacing: { before: 250, after: 120 }
      }));
      i++; continue;
    }
    // 段落 P (显式或隐式)
    let paraText = line;
    const pMatch = line.match(/@@P@@(.*)/);
    if (pMatch) paraText = pMatch[1];
    // 默认正文
    children.push(new Paragraph({
      children: inlineRuns(paraText.trim(), { size: 21, font: 'SimSun' }),
      spacing: { line: 360, after: 100 },
      indent: { firstLine: 420 }  // 首行缩进 2 字符
    }));
    i++;
  }
  return children;
}

// 预渲染所有 SVG 图为 PNG (异步, 浏览器侧)
// 返回 { processFlow, tornado, cashflow } 三张图的 PNG Uint8Array
async function preRenderImages(ctx) {
  const images = {};
  // 1. 工艺流程示意图
  try {
    const svg1 = buildProcessFlowSvg(ctx);
    images.processFlow = await svgToPngBytes(svg1, 1200, 500);
  } catch(e) {
    console.warn('processFlow 渲染失败:', e); images.processFlow = null;
  }
  // 2. Tornado
  try {
    const sens = (ctx.finance && ctx.finance.tables && ctx.finance.tables.sensitivity) || [];
    if (sens.length > 0) {
      const svg2 = buildTornadoSvg(ctx);
      const tornadoH = 60 + sens.length * 50 + 60;
      images.tornado = await svgToPngBytes(svg2, 800, tornadoH);
    }
  } catch(e) {
    console.warn('tornado 渲染失败:', e); images.tornado = null;
  }
  // 3. 累计现金流
  try {
    const cf = (ctx.finance && ctx.finance.tables && ctx.finance.tables.cashflowTotal) || [];
    if (cf.length > 0) {
      const svg3 = buildCashflowSvg(ctx);
      images.cashflow = await svgToPngBytes(svg3, 800, 420);
    }
  } catch(e) {
    console.warn('cashflow 渲染失败:', e); images.cashflow = null;
  }
  return images;
}

// 拼装 docx Blob
async function buildDocxBlob(chapters, ctx) {
  const dx = await loadDocxLibrary();
  const { Document, Packer, Paragraph, TextRun, AlignmentType, PageBreak } = dx;

  // 预渲染所有图片为 PNG
  const images = await preRenderImages(ctx);

  const allChildren = [];

  // 封面
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: ctx.project.name, bold: true, size: 56, font: 'SimHei' })],
    alignment: AlignmentType.CENTER,
    spacing: { before: 4000, after: 800 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: '可行性研究报告', bold: true, size: 40, font: 'SimHei' })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 400 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: ctx.project.owner, size: 28, font: 'SimSun' })],
    alignment: AlignmentType.CENTER,
    spacing: { before: 800, after: 200 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: ctx.project.editor + ' · ' + ctx.project.editDate, size: 24, font: 'SimSun' })],
    alignment: AlignmentType.CENTER,
    spacing: { after: 200 }
  }));
  allChildren.push(new Paragraph({
    children: [new TextRun({ text: '由 iRAS v' + ctx.meta.irasVersion + ' 自动生成', size: 18, italics: true, color: '6B7280' })],
    alignment: AlignmentType.CENTER,
    spacing: { before: 4000 },
    pageBreakBefore: false
  }));
  allChildren.push(new Paragraph({ children: [new PageBreak()] }));

  // 各章
  chapters.forEach((ch, idx) => {
    const childrenOfChapter = parseTextToDocxChildren(ch.text, dx, images);
    childrenOfChapter.forEach(c => allChildren.push(c));
    if (idx < chapters.length - 1) {
      allChildren.push(new Paragraph({ children: [new PageBreak()] }));
    }
  });

  const doc = new Document({
    creator: 'iRAS v' + ctx.meta.irasVersion,
    title: ctx.project.name + ' - 可行性研究报告',
    description: 'iRAS 自动生成的可行性研究报告',
    styles: {
      default: {
        document: {
          run: { font: 'SimSun', size: 21 }
        }
      }
    },
    sections: [{
      properties: {
        page: {
          margin: { top: 1440, right: 1440, bottom: 1440, left: 1440 }  // 1 英寸 = 1440 twip
        }
      },
      children: allChildren
    }]
  });

  return await Packer.toBlob(doc);
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// =============================================================================
//   事件绑定
// =============================================================================

document.addEventListener('DOMContentLoaded', () => {
  if (tryLoadData()) {
    bootstrap();
  } else {
    // 没数据, bootstrap 会显示 empty state
    loadFormFromStorage();
    bootstrap();
  }

  // v1.5 Bug 37: 全局拖拽 JSON 加载
  document.body.addEventListener('dragover', (e) => { e.preventDefault(); });
  document.body.addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.pidSchema && !(parsed.results && parsed.results.summary && parsed.results.summary.finance)) {
          alert('JSON 格式不识别. 请确认这是从主页面下载的「可研报告数据」备份, 不是「保存方案」原始 JSON.');
          return;
        }
        STATE.data = parsed;
        bootstrap();
      } catch (err) { alert('JSON 解析失败: ' + err.message); }
    };
    reader.readAsText(file);
  });

  // 顶栏按钮
  document.getElementById('btnReloadData').addEventListener('click', () => {
    if (tryLoadData()) {
      bootstrap();
      setStatus('数据已重新载入', 'success');
    } else {
      setStatus('未找到方案数据,请到主页面重新点击 📄 生成可研报告', 'error');
    }
  });

  document.getElementById('btnClearForm').addEventListener('click', () => {
    if (confirm('确认清空所有表单字段?')) {
      STATE.form = {};
      saveFormToStorage();
      bootstrap();  // 重新渲染
    }
  });

  // postMessage 监听 (主页面再次点 → 通知刷新)
  window.addEventListener('message', (ev) => {
    if (ev && ev.data && ev.data.type === 'iRAS_REPORT_RELOAD') {
      tryLoadData();
      bootstrap();
    }
  });
});
</script>
</body>
</html>
