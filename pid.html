function refreshInspector() {
  const el = $('inspectorBody');
  if (!STATE.data) {
    el.innerHTML =
      '<div class="empty-state">' +
        '<div>等待数据载入</div>' +
        '<div class="hint">' +
          '可以:<br>' +
          '• 点 <code>📂 加载示例</code> 试用<br>' +
          '• 点 <code>📁 选择 JSON 文件</code> 选文件<br>' +
          '• 直接拖 JSON 到画布' +
        '</div>' +
      '</div>';
    return;
  }
  const stage = STATE.data.results.perStage[STATE.designStageIdx];
  el.innerHTML = '';
  el.appendChild(renderTreeNode('stage', stage, true));
}

function renderTreeNode(key, val, isRoot) {
  if (val === null || val === undefined) return leaf(key, val);
  if (typeof val !== 'object') return leaf(key, val);
  if (Array.isArray(val))      return arrayNode(key, val);

  const det = document.createElement('details');
  det.className = 'tree-node';
  if (isRoot || ['farm', 'load', 'flow', 'equipment', 'pumps', 'thermal'].indexOf(key) >= 0) {
    det.open = true;
  }
  const sum = document.createElement('summary');
  const isDisabled = val.enabled === false;
  let html = '<span class="tree-key' + (isDisabled ? ' disabled' : '') + '">' + key + '</span>';
  if (val.tag) html += ' <span class="tree-val string">' + val.tag + '</span>';
  if ('enabled' in val) {
    html += ' <span class="tree-val ' + (val.enabled ? 'boolean' : 'null') + '">' +
            (val.enabled ? '✓ enabled' : '✗ disabled') + '</span>';
  }
  if (val.kw != null && html.indexOf('kW') < 0) {
    html += ' <span class="tree-val number">' + fmtNum(val.kw) + '<span class="unit"> kW</span></span>';
  }
  if (val.flowMain != null) {
    html += ' <span class="tree-val number">' + fmtNum(val.flowMain) + '<span class="unit"> m³/h</span></span>';
  }
  sum.innerHTML = html;
  det.appendChild(sum);

  for (const k in val) {
    if (Object.prototype.hasOwnProperty.call(val, k)) {
      det.appendChild(renderTreeNode(k, val[k], false));
    }
  }
  return det;
}

function arrayNode(key, arr) {
  const det = document.createElement('details');
  det.className = 'tree-node';
  const sum = document.createElement('summary');
  sum.innerHTML = '<span class="tree-key">' + key + '</span> <span class="tree-val null">[' + arr.length + ']</span>';
  det.appendChild(sum);
  arr.forEach(function(v, i) { det.appendChild(renderTreeNode('[' + i + ']', v, false)); });
  return det;
}

function leaf(key, val) {
  const div = document.createElement('div');
  div.className = 'tree-leaf';
  let cls, txt;
  if (val === null) { cls = 'null'; txt = 'null'; }
  else if (val === undefined) { cls = 'null'; txt = 'undefined'; }
  else if (typeof val === 'string') { cls = 'string'; txt = '"' + val + '"'; }
  else if (typeof val === 'boolean') { cls = 'boolean'; txt = String(val); }
  else if (typeof val === 'number') { cls = 'number'; txt = fmtNum(val); }
  else { cls = ''; txt = String(val); }
  div.innerHTML = '<span class="tree-key">' + key + '</span>: <span class="tree-val ' + cls + '">' + txt + '</span>';
  return div;
}

function refreshLayerEnableState() {
  document.querySelectorAll('.layer-row').forEach(function(row) {
    row.dataset.disabled = 'false';
  });
}

function refreshStatusBar(byteSize, sourceLabel) {
  $('statusLeft').textContent = STATE.data
    ? '已载入: ' + (sourceLabel || '(无名)')
    : '就绪';
  $('statusSchema').textContent = 'schema: ' + (STATE.data ? STATE.data.pidSchema : '—');
  $('statusStages').textContent = '阶段: ' + (STATE.data ? STATE.data.results.perStage.length : '—');
  $('statusBytes').textContent = '大小: ' + (byteSize ? fmtBytes(byteSize) : '—');
}

function toggleLayer(layerName, visible) {
  const g = $('layer-' + layerName);
  if (!g) return;
  g.style.display = visible ? '' : 'none';
}

function bindEvents() {
  $('btnLoadSample').addEventListener('click', loadSample);
  $('btnLoadFile').addEventListener('click', function() { $('fileInput').click(); });
  $('fileInput').addEventListener('change', function(e) {
    const f = e.target.files[0];
    if (f) loadFromFile(f);
    e.target.value = '';
  });
  $('btnClear').addEventListener('click', clearData);

  const area = $('canvasArea');
  ['dragover', 'dragenter'].forEach(function(evt) {
    area.addEventListener(evt, function(e) { e.preventDefault(); area.classList.add('drag-over'); });
  });
  ['dragleave', 'dragend', 'drop'].forEach(function(evt) {
    area.addEventListener(evt, function(e) { e.preventDefault(); area.classList.remove('drag-over'); });
  });
  area.addEventListener('drop', function(e) {
    const f = e.dataTransfer.files[0];
    if (f) {
      if (!f.name.endsWith('.json')) { toast('请拖入 .json 文件', 'warn'); return; }
      loadFromFile(f);
    }
  });

  document.querySelectorAll('.layer-row input[type="checkbox"]').forEach(function(cb) {
    cb.addEventListener('change', function(e) {
      const row = e.target.closest('.layer-row');
      toggleLayer(row.dataset.layer, e.target.checked);
    });
  });

  $('stageSelect').addEventListener('change', function(e) {
    STATE.designStageIdx = parseInt(e.target.value, 10);
    refreshTopSummary();
    refreshInspector();
    renderAll();    // ← 阶段切换时重画
  });
}

document.addEventListener('DOMContentLoaded', function() {
  bindEvents();
  refreshAll();
  console.info('[iRAS P&ID v2.0 骨架] 就绪. 调试: window.STATE');
  window.STATE = STATE;

  // v1.3 集成: 自动从 localStorage 加载 iRAS 主页面传入的方案数据
  // (v1.3.x: 由 sessionStorage 改为 localStorage, 避免新窗口偶尔读不到)
  function tryLoadFromSessionStorage(label) {
    try {
      const stashed = localStorage.getItem('iRAS_pidExport') || sessionStorage.getItem('iRAS_pidExport');
      if (stashed) {
        loadFromText(stashed, label || 'iRAS 主页面方案 (自动载入)');
        // 用完即清, 防止陈旧数据
        localStorage.removeItem('iRAS_pidExport');
        sessionStorage.removeItem('iRAS_pidExport');
        return true;
      }
    } catch(e) { console.warn('storage 自动载入失败:', e); }
    return false;
  }
  // 第一次打开窗口: DOMContentLoaded 时直接读
  tryLoadFromSessionStorage();

  // 复用窗口场景: 主页面再次点 "输出 P&ID" 时, 主页通过 postMessage 通知, 这里重新加载
  window.addEventListener('message', function(ev) {
    if (ev && ev.data && ev.data.type === 'iRAS_PID_RELOAD') {
      tryLoadFromSessionStorage('iRAS 主页面方案 (刷新载入)');
    }
  });
});
</script>
</body>
</html>
